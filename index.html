<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚡ Bill Manager - MAC | Pinto | PJ Electricals</title>
<style>
:root{--p:#0176d3;--pl:#eef4ff;--pd:#014486;--s:#2e844a;--w:#dd7a01;--d:#ea001e;--bg:#f3f6f9;--c:#fff;--t:#181818;--tl:#706e6b;--b:#e5e5e5;--sh:0 2px 6px rgba(0,0,0,.07);--shl:0 12px 24px -4px rgba(0,0,0,.12);--r:12px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--t);min-height:100vh}
/* Sidebar */
.sb{position:fixed;left:0;top:0;bottom:0;width:250px;background:linear-gradient(180deg,#032d60,#001639);color:#fff;z-index:100;overflow-y:auto}
.sb-hd{padding:20px;border-bottom:1px solid rgba(255,255,255,.08)}
.sb-hd h2{font-size:17px;font-weight:700;color:#1b96ff;letter-spacing:.3px}
.sb-hd p{font-size:11px;color:#b0adab;margin-top:5px}
.sb nav{padding:10px 0}
.ns{padding:10px 20px 4px;font-size:10px;text-transform:uppercase;letter-spacing:1.2px;color:#576574;font-weight:700}
.ni{display:flex;align-items:center;padding:11px 20px;cursor:pointer;transition:all .18s;color:#b0adab;font-size:13.5px;gap:10px}
.ni:hover{background:rgba(255,255,255,.06);color:#fff;padding-left:24px}
.ni.a{background:rgba(1,118,211,.2);color:#1b96ff;border-left:4px solid #1b96ff;border-right:none;padding-left:16px}
.ni svg{width:18px;height:18px;flex-shrink:0}
/* Main */
.mn{margin-left:250px;padding:24px 28px;min-height:100vh}
.ph{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;flex-wrap:wrap;gap:10px}
.ph h1{font-size:24px;font-weight:700;color:#032d60}
.ph .st{font-size:13px;color:var(--tl);margin-top:2px}
.ph .breadcrumb{font-size:12px;color:var(--tl);margin-bottom:4px}
.ph .breadcrumb a{color:var(--p);text-decoration:none;cursor:pointer}
.ph .breadcrumb a:hover{text-decoration:underline}
/* Card */
.cd{background:var(--c);border-radius:var(--r);box-shadow:var(--sh);padding:24px;margin-bottom:18px;border-left:4px solid var(--p)}
.ch{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid var(--b)}
.ch h3{font-size:16px;font-weight:700;color:#032d60}
/* Buttons */
.bt{display:inline-flex;align-items:center;gap:6px;padding:9px 18px;border:none;border-radius:8px;cursor:pointer;font-size:13px;font-weight:500;transition:all .18s;font-family:inherit}
.bp{background:var(--p);color:#fff}.bp:hover{background:var(--pd);box-shadow:0 2px 8px rgba(1,118,211,.3)}
.bs{background:var(--s);color:#fff}.bs:hover{background:#1c6334;box-shadow:0 2px 8px rgba(46,132,74,.3)}
.bw{background:var(--w);color:#fff}.bw:hover{background:#b45309;box-shadow:0 2px 8px rgba(221,122,1,.3)}
.bd{background:var(--d);color:#fff}.bd:hover{background:#ba0517;box-shadow:0 2px 8px rgba(234,0,30,.3)}
.bo{background:transparent;border:1px solid var(--b);color:var(--t)}.bo:hover{background:var(--bg);box-shadow:0 1px 4px rgba(0,0,0,.06)}
.bsm{padding:5px 12px;font-size:12px}
.blg{padding:11px 24px;font-size:14.5px}
/* Forms */
.fg{margin-bottom:14px}
.fg label{display:block;font-size:11.5px;font-weight:700;color:#3e3e3c;margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px}
.fg input,.fg select,.fg textarea{width:100%;padding:10px 12px;border:1px solid var(--b);border-radius:8px;font-size:13px;font-family:inherit;transition:all .18s;background:#fff}
.fg input:focus,.fg select:focus{outline:none;border-color:var(--p);box-shadow:0 0 0 3px rgba(1,118,211,.15)}
.fr{display:grid;gap:14px}
.f2{grid-template-columns:1fr 1fr}.f3{grid-template-columns:1fr 1fr 1fr}.f4{grid-template-columns:1fr 1fr 1fr 1fr}
/* Table */
table{width:100%;border-collapse:collapse;font-size:13px}
th{background:var(--bg);padding:10px 12px;text-align:left;font-weight:700;font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:#3e3e3c;border-bottom:2px solid var(--b)}
td{padding:9px 12px;border-bottom:1px solid var(--b)}
tr:hover td{background:rgba(1,118,211,.02)}
.badge{display:inline-block;padding:3px 10px;border-radius:12px;font-size:11px;font-weight:600}
.bb{background:#d8edff;color:#014486}.bg{background:#cdefc8;color:#1c6334}.by{background:#fef3c7;color:#92400e}.br{background:#fdd;color:#ba0517}
/* Stats */
.sg{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px}
.sc{background:var(--c);border-radius:var(--r);padding:20px;box-shadow:var(--sh);border-top:4px solid var(--p);position:relative;overflow:hidden}
.sc .lb{font-size:12px;color:var(--tl);font-weight:600;text-transform:uppercase;letter-spacing:.5px}.sc .vl{font-size:30px;font-weight:800;margin-top:6px}.sc .su{font-size:12px;color:var(--tl);margin-top:4px}
.sc:nth-child(2){border-top-color:var(--s)}.sc:nth-child(3){border-top-color:var(--w)}.sc:nth-child(4){border-top-color:#706e6b}
/* Quick-create bar */
.qc-bar{display:flex;gap:12px;margin-bottom:24px;flex-wrap:wrap}
.qc-btn{flex:1;min-width:160px;padding:16px 18px;background:var(--c);border:2px solid var(--b);border-radius:var(--r);cursor:pointer;display:flex;align-items:center;gap:12px;transition:all .2s;box-shadow:var(--sh)}
.qc-btn:hover{border-color:var(--p);background:var(--pl);transform:translateY(-2px);box-shadow:var(--shl)}
.qc-btn .qc-icon{font-size:26px}.qc-btn .qc-text{font-size:14px;font-weight:600}.qc-btn .qc-sub{font-size:11px;color:var(--tl)}
/* Smart search / autocomplete */
.ss{position:relative}
.ss input{padding-left:38px;font-size:14px;padding:12px 14px 12px 38px;border-radius:10px;border:2px solid var(--b);background:#fff;transition:all .2s}
.ss input:focus{border-color:var(--p);box-shadow:0 0 0 3px rgba(1,118,211,.12)}
.ss .si{position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:18px;color:var(--tl)}
.ss-drop{position:absolute;top:100%;left:0;right:0;background:#fff;border:1px solid var(--b);border-radius:0 0 10px 10px;max-height:280px;overflow-y:auto;z-index:50;box-shadow:var(--shl);display:none}
.ss-drop.show{display:block}
.ss-item{padding:12px 16px;cursor:pointer;border-bottom:1px solid #f3f6f9;transition:background .12s}
.ss-item:hover,.ss-item.hl{background:var(--pl)}
.ss-item .ss-name{font-weight:600;font-size:13.5px}.ss-item .ss-info{font-size:11.5px;color:var(--tl);margin-top:3px}
/* Company pills - compact */
.cp{display:inline-flex;gap:8px;margin-bottom:14px}
.cpill{padding:8px 18px;border-radius:20px;cursor:pointer;font-size:13px;font-weight:600;border:2px solid var(--b);background:#fff;transition:all .18s}
.cpill.a{border-color:var(--p);background:var(--pl);color:var(--p);box-shadow:0 1px 4px rgba(1,118,211,.15)}
.cpill:hover{border-color:var(--p);transform:translateY(-1px)}
/* Doc type pills */
.dtp{display:inline-flex;gap:8px;margin-bottom:14px}
.dtpill{padding:8px 18px;border-radius:20px;cursor:pointer;font-size:13px;font-weight:600;border:2px solid var(--b);background:#fff;transition:all .18s}
.dtpill.a{border-color:var(--p);background:var(--pl);color:var(--p);box-shadow:0 1px 4px rgba(1,118,211,.15)}
.dtpill:hover{border-color:var(--p);transform:translateY(-1px)}
/* Line items - spacious table */
.lt{width:100%;border-collapse:collapse;font-size:13px}
.lt th{background:#eef4ff;padding:10px 8px;font-size:10.5px;text-align:center;font-weight:700;text-transform:uppercase;letter-spacing:.4px;border-bottom:2px solid var(--p);white-space:nowrap;color:#032d60}
.lt td{padding:8px 5px;vertical-align:middle}
.lt tr:nth-child(even) td{background:#fafcff}
.lt tr:hover td{background:rgba(1,118,211,.04)}
.lt input,.lt select{padding:8px 8px;font-size:13px;border:1px solid var(--b);border-radius:6px;width:100%;font-family:inherit;transition:border .15s}
.lt input:focus,.lt select:focus{outline:none;border-color:var(--p);box-shadow:0 0 0 2px rgba(1,118,211,.1)}
.lt .ro{background:#f3f6f9;font-weight:700;text-align:right;color:#032d60}
.rl{background:none;border:none;color:var(--d);cursor:pointer;font-size:18px;padding:4px 6px;border-radius:4px;transition:all .15s}
.rl:hover{color:#ba0517;background:rgba(234,0,30,.08)}
/* Quick item search in line */
.qi{position:relative}
.qi-drop{position:absolute;top:100%;left:0;right:0;background:#fff;border:2px solid var(--p);border-top:none;border-radius:0 0 10px 10px;max-height:260px;overflow-y:auto;z-index:40;box-shadow:var(--shl);display:none;font-size:12px}
.qi-drop.show{display:block}
.qi-item{padding:10px 14px;cursor:pointer;border-bottom:1px solid #f3f4f6;transition:background .1s}
.qi-item:hover{background:var(--pl)}
.qi-item b{color:var(--p)}
.last-row td{border-bottom:2px dashed var(--b)}
/* Summary floating */
.sum-float{position:sticky;bottom:0;background:var(--c);border-top:3px solid var(--p);padding:18px 24px;margin:-24px;margin-top:14px;border-radius:0 0 var(--r) var(--r);z-index:10;box-shadow:0 -4px 12px rgba(0,0,0,.05)}
.sum-grid{display:grid;grid-template-columns:1fr auto 1fr;gap:16px;align-items:center}
.sum-total{text-align:center}
.sum-total .big{font-size:32px;font-weight:800;color:var(--p);letter-spacing:-.5px}
.sum-total .sub{font-size:11px;color:var(--tl);margin-top:2px}
.sum-details{font-size:12.5px}
.sum-details .row{display:flex;justify-content:space-between;padding:3px 0}
/* Modal */
.mo{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:1000;display:flex;align-items:center;justify-content:center}
.md{background:var(--c);border-radius:var(--r);max-width:800px;width:95%;max-height:85vh;overflow-y:auto;box-shadow:var(--shl)}
.mh{padding:18px 24px;border-bottom:none;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;background:var(--p);z-index:10;color:#fff;border-radius:var(--r) var(--r) 0 0}
.mh h3{font-size:16px;font-weight:700;color:#fff}
.mc{background:none;border:none;font-size:20px;cursor:pointer;color:rgba(255,255,255,.8);padding:4px}
.mc:hover{color:#fff}
.mb{padding:24px}
.mf{padding:16px 24px;border-top:1px solid var(--b);display:flex;justify-content:flex-end;gap:10px;position:sticky;bottom:0;background:var(--c)}
/* Toast */
.toast{position:fixed;top:16px;right:16px;color:#fff;padding:10px 18px;border-radius:8px;z-index:2000;font-size:12.5px;animation:si .3s}
@keyframes si{from{transform:translateX(80px);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes pulse{from{opacity:.4;width:30%}to{opacity:1;width:80%}}
/* Print */
.inv-header{text-align:center;border-bottom:2px solid #000;padding-bottom:10px;margin-bottom:10px}
.inv-header h1{font-size:20px;font-weight:800;letter-spacing:1px;margin:0}
.inv-header .doc-type{font-size:16px;font-weight:700;margin-bottom:4px;color:#333}
.inv-header .address{font-size:11px;color:#444;margin-top:4px}
.inv-header .contact{font-size:11px;color:#444}
.inv-meta{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:10px 0}
.inv-meta-box{border:1px solid #ccc;padding:8px 10px;border-radius:4px}
.inv-meta-box .lbl{font-size:10px;color:#666;font-weight:600;text-transform:uppercase}
.inv-meta-box .val{font-size:12px;font-weight:600;margin-top:2px}
.inv-table{width:100%;border-collapse:collapse;margin:10px 0}
.inv-table th{background:#f0f0f0;border:1px solid #ccc;padding:5px 6px;font-size:9.5px;text-transform:uppercase;text-align:center}
.inv-table td{border:1px solid #ccc;padding:4px 6px;font-size:11px}
.inv-table .right{text-align:right}.inv-table .center{text-align:center}
.inv-summary{margin:10px 0}.inv-summary table{width:50%;margin-left:auto;border-collapse:collapse}
.inv-summary td{padding:3px 8px;font-size:11px}
.inv-summary .total-row{font-weight:700;font-size:13px;border-top:2px solid #000}
.inv-footer{display:grid;grid-template-columns:1fr 1fr;margin-top:16px;padding-top:10px;border-top:1px solid #ccc}
.inv-bank{font-size:9.5px;line-height:1.5}.inv-bank .title{font-weight:700;font-size:10px;margin-bottom:3px}
.inv-sign{text-align:right}.inv-sign .for-text{font-size:11px;font-weight:600}.inv-sign .sign-space{height:45px}.inv-sign .prop{font-size:11px}
.inv-words{font-size:10.5px;font-style:italic;padding:5px 0;border-top:1px solid #ccc;border-bottom:1px solid #ccc;margin:6px 0}
.inv-gst-table{width:100%;border-collapse:collapse;margin:6px 0;font-size:9.5px}
.inv-gst-table th,.inv-gst-table td{border:1px solid #ccc;padding:3px 5px;text-align:center}
.inv-gst-table th{background:#f0f0f0}
/* Filter */
.fb{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
.fb input{padding:10px 14px;border:2px solid var(--b);border-radius:8px;font-size:13px;min-width:220px;transition:all .18s}
.fb input:focus{border-color:var(--p);box-shadow:0 0 0 3px rgba(1,118,211,.1);outline:none}
.fb select{padding:10px 12px;border:2px solid var(--b);border-radius:8px;font-size:13px}
/* Chart */
.chart-bar{display:flex;align-items:flex-end;gap:6px;height:100px;padding-top:8px}
.chart-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px}
.chart-col .bar{width:100%;border-radius:4px 4px 0 0;min-height:2px}
.chart-col .bar-label{font-size:9px;color:var(--tl)}.chart-col .bar-value{font-size:9px;font-weight:600}
/* Convert actions */
.ca{display:flex;gap:4px;flex-wrap:wrap}
/* Keyboard hint */
.kh{font-size:9px;color:var(--tl);background:var(--bg);padding:1px 5px;border-radius:3px;margin-left:4px}
/* Auto tax indicator */
.tax-auto-indicator{display:inline-block;font-size:10.5px;font-weight:600;padding:3px 8px;border-radius:6px;margin-left:6px;vertical-align:middle}
.tax-auto-indicator.intra{background:#cdefc8;color:#1c6334}
.tax-auto-indicator.inter{background:#fef3c7;color:#92400e}
/* Responsive */
@media(max-width:900px){.sb{transform:translateX(-100%)}.mn{margin-left:0}.sg{grid-template-columns:1fr 1fr}.f3,.f4{grid-template-columns:1fr 1fr}}
@media(max-width:600px){.f2,.f3,.f4{grid-template-columns:1fr}.sg{grid-template-columns:1fr}}
@media print{.sb,.mn,.no-print{display:none!important}.print-area{display:block!important;margin:0;padding:15px}body{background:#fff}}
.print-area{display:none}
/* Highlighted row — handled above in .lt tr:hover */
/* Import UI */
.drop-zone{border:2px dashed var(--b);border-radius:12px;padding:40px 20px;text-align:center;cursor:pointer;transition:all .2s;background:#fafbfc}
.drop-zone:hover,.drop-zone.drag-over{border-color:var(--p);background:var(--pl)}
.drop-zone .dz-icon{font-size:36px;margin-bottom:8px}
.drop-zone .dz-text{font-size:14px;font-weight:600;color:var(--t)}
.drop-zone .dz-sub{font-size:11px;color:var(--tl);margin-top:4px}
.imp-preview{max-height:350px;overflow:auto;margin:12px 0;border:1px solid var(--b);border-radius:8px}
.imp-preview table{font-size:11px;width:100%;border-collapse:collapse}
.imp-preview th{position:sticky;top:0;background:var(--bg);padding:6px 8px;text-align:left;font-size:10px;z-index:2;border-bottom:2px solid var(--b)}
.imp-preview td{padding:4px 8px;border-bottom:1px solid #f3f4f6;white-space:nowrap;max-width:200px;overflow:hidden;text-overflow:ellipsis}
.imp-preview tr:hover td{background:rgba(26,86,219,.04)}
.map-row{display:flex;align-items:center;gap:10px;padding:6px 0;border-bottom:1px solid #f3f4f6}
.map-row .src{font-weight:600;font-size:12px;min-width:140px;color:var(--p)}
.map-row select{padding:5px 8px;font-size:12px;border:1px solid var(--b);border-radius:5px;min-width:160px}
.map-row .arrow{color:var(--tl)}
.imp-stats{display:flex;gap:14px;margin:12px 0;flex-wrap:wrap}
.imp-stat{background:var(--bg);padding:8px 14px;border-radius:8px;font-size:12px}
.imp-stat b{font-size:16px;display:block;margin-bottom:2px}
.step-bar{display:flex;gap:0;margin-bottom:20px}
.step-item{flex:1;text-align:center;padding:10px 8px;font-size:11px;font-weight:600;color:var(--tl);border-bottom:3px solid var(--b);transition:all .15s}
/* OCR / Image import */
.ocr-zone{border:2px dashed var(--b);border-radius:12px;padding:30px 20px;text-align:center;cursor:pointer;transition:all .2s;background:#fafbfc}
.ocr-zone:hover,.ocr-zone.drag-over{border-color:var(--w);background:#fffbeb}
.ocr-preview{max-width:100%;max-height:300px;border-radius:8px;margin:12px auto;display:block;box-shadow:var(--sh)}
.ocr-progress{margin:16px 0;text-align:center}
.ocr-bar{width:100%;height:8px;background:var(--b);border-radius:4px;overflow:hidden;margin:8px 0}
.ocr-bar-fill{height:100%;background:linear-gradient(90deg,var(--w),var(--s));border-radius:4px;transition:width .3s}
.ocr-status{font-size:12px;color:var(--tl);font-weight:500}
.ocr-edit-table{width:100%;border-collapse:collapse;font-size:12px;margin:10px 0}
.ocr-edit-table th{background:var(--bg);padding:6px 8px;text-align:left;font-size:10px;text-transform:uppercase;border-bottom:2px solid var(--b)}
.ocr-edit-table td{padding:4px 6px;border-bottom:1px solid #f3f4f6}
.ocr-edit-table input{width:100%;padding:4px 6px;font-size:12px;border:1px solid var(--b);border-radius:4px;font-family:inherit}
.ocr-edit-table input:focus{outline:none;border-color:var(--p)}
.ocr-raw{background:#1e293b;color:#e2e8f0;padding:14px;border-radius:8px;font-family:'Courier New',monospace;font-size:11px;max-height:200px;overflow-y:auto;white-space:pre-wrap;line-height:1.5;margin:10px 0}
.step-item.active{color:var(--p);border-bottom-color:var(--p);background:var(--pl)}
.step-item.done{color:var(--s);border-bottom-color:var(--s)}
.tab-bar{display:flex;gap:0;border-bottom:2px solid var(--b);margin-bottom:16px}
.tab-btn{padding:9px 18px;cursor:pointer;font-size:12.5px;font-weight:500;color:var(--tl);border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .12s;background:none;border-top:none;border-left:none;border-right:none;font-family:inherit}
.tab-btn.active{color:var(--p);border-bottom-color:var(--p)}
.tab-btn:hover{color:var(--p)}
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/tesseract.js/5.1.1/tesseract.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>if(window.pdfjsLib)pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';</script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
</head>
<body>
<div class="sb">
  <div class="sb-hd"><h2>⚡ Bill Manager</h2><p>MAC | Pinto | PJ Electricals</p></div>
  <nav>
    <div class="ns">Main</div>
    <div class="ni a" onclick="sp('dash')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>Dashboard</div>
    <div class="ns">Create</div>
    <div class="ni" onclick="sp('create')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>New Document</div>
    <div class="ns">Records</div>

function getFY(){const n=new Date(),y=n.getFullYear(),m=n.getMonth();return m>=3?`${(y%100).toString().padStart(2,'0')}-${((y+1)%100).toString().padStart(2,'0')}`:`${((y-1)%100).toString().padStart(2,'0')}-${(y%100).toString().padStart(2,'0')}`;}
function gdn(c,dt){const fy=getFY();let pf=c.invoicePrefix,k;switch(dt){case'invoice':k='nextInvoiceNo';break;case'quotation':k='nextQuoteNo';pf+='/Q';break;case'challan':k='nextChallanNo';pf+='/DC';break;case'proforma':k='nextProformaNo';pf+='/PI';break;}const n=String(c[k]).padStart(3,'0');c[k]++;sv();return`${pf}/${fy}/${n}`;}
function n2w(num){if(!num||num===0)return'ZERO';const o=['','ONE','TWO','THREE','FOUR','FIVE','SIX','SEVEN','EIGHT','NINE','TEN','ELEVEN','TWELVE','THIRTEEN','FOURTEEN','FIFTEEN','SIXTEEN','SEVENTEEN','EIGHTEEN','NINETEEN'];const t=['','','TWENTY','THIRTY','FORTY','FIFTY','SIXTY','SEVENTY','EIGHTY','NINETY'];function cv(n){if(n<20)return o[n];if(n<100)return t[Math.floor(n/10)]+(n%10?' '+o[n%10]:'');if(n<1000)return o[Math.floor(n/100)]+' HUNDRED'+(n%100?' AND '+cv(n%100):'');if(n<100000)return cv(Math.floor(n/1000))+' THOUSAND'+(n%1000?' '+cv(n%1000):'');if(n<10000000)return cv(Math.floor(n/100000))+' LAKH'+(n%100000?' '+cv(n%100000):'');return cv(Math.floor(n/10000000))+' CRORE'+(n%10000000?' '+cv(n%10000000):'');}return'RUPEES '+cv(Math.round(num))+' ONLY.';}

// Customer search
function searchCust(q){
  const drop=document.getElementById('custDrop');if(!drop)return;
  if(!q||q.length<1){drop.classList.remove('show');return;}
  q=q.toLowerCase();
  const matches=S.customers.filter(c=>{
    const nm=(c.name||'').toLowerCase(),cd=(c.code||'').toLowerCase(),ad=(c.address||'').toLowerCase(),gs=(c.gstin||'').toLowerCase(),ph=(c.phone||'').toLowerCase();
    return nm.includes(q)||cd.includes(q)||ad.includes(q)||gs.includes(q)||ph.includes(q);
  }).slice(0,12);
  if(!matches.length){drop.innerHTML='<div style="padding:14px 16px;color:var(--tl);font-size:12.5px">No match found. Fill details below to add as new customer.</div>';drop.classList.add('show');return;}
  drop.innerHTML=matches.map(c=>`<div class="ss-item" onclick="pickCust('${c.id}')"><div class="ss-name">${c.code||''} — ${c.name||''}</div><div class="ss-info">${c.address||''}${c.gstin?' | GSTIN: '+c.gstin:''}</div></div>`).join('');
  drop.classList.add('show');
}
function pickCust(id){
  selCustId=id;const c=gcu(id);if(!c)return;
  document.getElementById('custSearch').value=(c.code||'')+' — '+(c.name||'');
  document.getElementById('custDrop').classList.remove('show');
  document.getElementById('custDetails').style.display='block';
  document.getElementById('cCode').value=c.code||'';
  document.getElementById('cName').value=c.name||'';
  document.getElementById('cAddr').value=c.address||'';
  document.getElementById('cGstin').value=c.gstin||'';
  document.getElementById('cPan').value=c.pan||'';
  document.getElementById('cState').value=c.stateCode||'27';
  // Auto-determine CGST/SGST vs IGST
  if(isGstCo()){
    const custState=c.gstin&&c.gstin.length>=2?c.gstin.substring(0,2):(c.stateCode||'27');
    const compState=gc(cid)?.stateCode||'27';
    const isSameState=custState===compState;
    const ttSel=document.getElementById('taxType');
    if(ttSel){ttSel.value=isSameState?'cgst_sgst':'igst';}
    const ind=document.getElementById('taxAutoInd');
    if(ind){ind.innerHTML=isSameState?'<span class="tax-auto-indicator intra">Auto: Intra-state</span>':'<span class="tax-auto-indicator inter">Auto: Inter-state</span>';}
    recalc();
  }
}
// Close dropdown on outside click
document.addEventListener('click',e=>{const d=document.getElementById('custDrop');if(d&&!e.target.closest('.ss'))d.classList.remove('show');document.querySelectorAll('.qi-drop').forEach(x=>{if(!e.target.closest('.qi'))x.classList.remove('show');});});

// UOM master — user can add custom UOMs
const UOM_DEFAULT=['NOS','BUNDLE','ROLL','MTR','RFT','FT','KG','SET','LOT','BOX','PKT','SQM','SQFT','PAIR','LTR','POINT','VISIT','JOB'];
function getUoms(){const custom=JSON.parse(localStorage.getItem('bm3_uoms')||'[]');return[...new Set([...UOM_DEFAULT,...custom])];}
function addCustomUom(val){if(!val)return;const custom=JSON.parse(localStorage.getItem('bm3_uoms')||'[]');val=val.toUpperCase().trim();if(!custom.includes(val)&&!UOM_DEFAULT.includes(val)){custom.push(val);localStorage.setItem('bm3_uoms',JSON.stringify(custom));}return val;}

// Line items
function liRow(l,i){
  const gst=isGstCo();
  const amt=l.qty*l.rate*(1-(l.discPct||0)/100);
  const uoms=getUoms();
  const isLast=i===LI.length-1;
  return`<tr class="${isLast?'last-row':''}">
    <td style="text-align:center;color:var(--tl);font-weight:700;font-size:13px">${i+1}</td>
    <td class="qi" style="position:relative">
      <input value="${(l.description||'').replace(/"/g,'&quot;')}" placeholder="${isLast&&!l.description?'🔍 Type item name, code or description...':'Item description'}"
        oninput="LI[${i}].description=this.value;searchItem(${i},this.value);autoAddRow(${i})"
        onfocus="searchItem(${i},this.value)"
        onchange="LI[${i}].description=this.value"
        autocomplete="off" style="font-size:14px;padding:8px 10px;font-weight:${l.description?'500':'400'}">
      <div class="qi-drop" id="qid${i}"></div>
    </td>
    ${gst?`<td><input value="${l.hsn}" onchange="LI[${i}].hsn=this.value" placeholder="HSN" style="text-align:center;font-size:12px;padding:8px 4px"></td>`:''}
    <td><input type="number" value="${l.qty||''}" min="0" step="0.5" placeholder="0"
      oninput="LI[${i}].qty=+this.value||0;recalcRow(${i})"
      style="text-align:center;font-size:15px;font-weight:600;padding:8px 4px;width:70px"></td>
    <td><select onchange="handleUomChange(${i},this)" style="font-size:12px;padding:7px 4px;width:82px">
      ${uoms.map(u=>`<option ${l.uom===u?'selected':''}>${u}</option>`).join('')}
      <option value="__custom__" style="color:var(--p);font-weight:600">+ Add new...</option>
    </select></td>
    <td><input type="number" value="${l.rate||''}" min="0" step="1" placeholder="₹ 0"
      oninput="LI[${i}].rate=+this.value||0;recalcRow(${i})"
      style="text-align:right;font-size:15px;font-weight:600;padding:8px 6px;width:100px"></td>
    <td><input type="number" value="${l.discPct||''}" min="0" max="100" step="0.5" placeholder="0"
      oninput="LI[${i}].discPct=+this.value||0;recalcRow(${i})"
      style="text-align:center;font-size:13px;padding:8px 4px;width:58px"></td>
    ${gst?`<td><select onchange="LI[${i}].gstRate=+this.value;recalc()" style="font-size:13px;padding:7px 4px;width:65px">${[0,5,12,18,28].map(r=>`<option value="${r}" ${l.gstRate==r?'selected':''}>${r}%</option>`).join('')}</select></td>`:''}
    <td><input value="${amt?'₹ '+amt.toFixed(2):''}" readonly class="ro" style="width:100px;font-size:13px;font-weight:700;padding:8px 6px;color:var(--p)"></td>
    <td><button class="rl" onclick="remLI(${i})" title="Remove row" style="font-size:18px;padding:4px 8px">✕</button></td>
  </tr>`;
}

// Recalc single row amount display (fast, no full re-render)
function recalcRow(i){
  LI[i].qty=LI[i].qty||0;LI[i].rate=LI[i].rate||0;LI[i].discPct=LI[i].discPct||0;
  recalc();
  // Update just the amount cell
  const amt=LI[i].qty*LI[i].rate*(1-(LI[i].discPct||0)/100);
  const rows=document.querySelectorAll('#liBody tr');
  if(rows[i]){const cells=rows[i].querySelectorAll('td');const last=cells[cells.length-2];const inp=last?.querySelector('input');if(inp)inp.value=amt?'₹ '+amt.toFixed(2):'';}
}

// Auto-add row when last row gets content
function autoAddRow(i){
  if(i===LI.length-1&&LI[i].description&&LI[i].description.length>2){
    LI.push(nli());
    const b=document.getElementById('liBody');
    if(b){const tmp=document.createElement('tbody');tmp.innerHTML=liRow(LI[LI.length-1],LI.length-1);b.appendChild(tmp.firstChild);}
  }
}

// UOM custom handler
function handleUomChange(i,sel){
  if(sel.value==='__custom__'){
    const custom=prompt('Enter new UOM (e.g., DRUM, COIL, FEET):');
    if(custom&&custom.trim()){
      const uom=addCustomUom(custom);
      LI[i].uom=uom;
      rfLI();
    }else{sel.value=LI[i].uom||'NOS';}
  }else{LI[i].uom=sel.value;}
}

function searchItem(i,q){
  const drop=document.getElementById('qid'+i);if(!drop)return;
  if(!q||q.length<1){drop.classList.remove('show');return;}
  q=q.toLowerCase();
  const matches=S.items.filter(x=>
    x.description.toLowerCase().includes(q)||
    x.code.toLowerCase().includes(q)||
    (x.hsn&&x.hsn.includes(q))||
    x.category.toLowerCase().includes(q)
  ).slice(0,12);
  if(!matches.length){drop.innerHTML='<div style="padding:10px 12px;color:var(--tl);font-size:12px">No matching item. You can type a custom description.</div>';drop.classList.add('show');return;}
  drop.innerHTML=matches.map(x=>`<div class="qi-item" onclick="pickItem(${i},'${x.id}')">
    <div style="display:flex;justify-content:space-between;align-items:center">
      <span><b style="color:var(--p)">${x.code}</b> &nbsp;${x.description}</span>
      <span style="color:var(--tl);font-size:11px;white-space:nowrap;margin-left:10px">${fc(x.rate)} · ${x.gstRate}% · ${x.uom}</span>
    </div></div>`).join('');
  drop.classList.add('show');
}
function pickItem(i,id){
  const it=gi(id);if(!it)return;
  LI[i]={itemId:it.id,code:it.code,description:it.description,hsn:it.hsn,qty:LI[i].qty||1,uom:it.uom,rate:it.rate,discPct:LI[i].discPct||0,gstRate:it.gstRate||18};
  document.getElementById('qid'+i).classList.remove('show');
  rfLI();recalc();
  // Focus the qty field so user can type quantity right away
  setTimeout(()=>{const rows=document.querySelectorAll('#liBody tr');if(rows[i]){const qtyInput=rows[i].querySelector('input[type="number"]');if(qtyInput)qtyInput.focus();}},50);
}
function addLI(n=1){for(let j=0;j<n;j++)LI.push(nli());rfLI();
  // Focus the last row's description field
  setTimeout(()=>{const rows=document.querySelectorAll('#liBody tr');if(rows.length){const last=rows[rows.length-1];const inp=last.querySelector('input');if(inp)inp.focus();}},50);
}
function remLI(i){if(LI.length<=1)return;LI.splice(i,1);rfLI();recalc();}
function rfLI(){const b=document.getElementById('liBody');if(b)b.innerHTML=LI.map((l,i)=>liRow(l,i)).join('');}

function recalc(){
  const gst=isGstCo();
  const oD=+(document.getElementById('oDisc')?.value)||0;
  const tt=gst?(document.getElementById('taxType')?.value||'cgst_sgst'):'none';
  const adv=+(document.getElementById('adv')?.value)||0;
  let tAmt=0,tDisc=0,tTax=0,tCgst=0,tSgst=0,tIgst=0,tVal=0;
  LI.forEach(l=>{const g=l.qty*l.rate;const ld=g*(l.discPct||0)/100;const ald=g-ld;const od=ald*oD/100;const tv=ald-od;
    let cg=0,sg=0,ig=0;
    if(gst){const gr=l.gstRate||0;if(tt==='cgst_sgst'){cg=tv*gr/200;sg=tv*gr/200;}else{ig=tv*gr/100;}}
    tAmt+=g;tDisc+=ld+od;tVal+=tv;tCgst+=cg;tSgst+=sg;tIgst+=ig;});
  tTax=tCgst+tSgst+tIgst;const gt=Math.round(tVal+tTax-adv);
  const el=document.getElementById('sumDisp');if(!el)return;
  el.innerHTML=`<div class="sum-float"><div class="sum-grid">
    <div class="sum-details">
      <div class="row"><span>Gross:</span><span>${fc(tAmt)}</span></div>
      ${tDisc>0?`<div class="row"><span>Discount:</span><span style="color:var(--d)">-${fc(tDisc)}</span></div>`:''}
      <div class="row"><span><b>${gst?'Taxable':'Net Amount'}:</b></span><span><b>${fc(tVal)}</b></span></div>
    </div>
    <div class="sum-total"><div class="big">${fc(gt)}</div><div class="sub">${n2w(gt)}</div></div>
    <div class="sum-details">
      ${gst?(tt==='cgst_sgst'?`<div class="row"><span>CGST:</span><span>${fc(tCgst)}</span></div><div class="row"><span>SGST:</span><span>${fc(tSgst)}</span></div>`:`<div class="row"><span>IGST:</span><span>${fc(tIgst)}</span></div>`):''}
      ${adv>0?`<div class="row"><span>Advance:</span><span style="color:var(--d)">-${fc(adv)}</span></div>`:''}
      ${gst?`<div class="row"><span>Total Tax:</span><span>${fc(tTax)}</span></div>`:''}
    </div>
  </div></div>`;
}

function resetForm(){LI=[nli()];selCustId='';edoc=null;rp();}

// Save
function saveDoc(){
  const cn=document.getElementById('cName')?.value;
  if(!cn){toast('Select or enter a customer','error');return;}
  const vi=LI.filter(l=>l.description&&l.qty>0&&l.rate>0);
  if(!vi.length){toast('Add at least one item','error');return;}
  let custId=selCustId;
  if(!custId){const nc={id:'c'+(++S.counters.customerId),code:document.getElementById('cCode')?.value||'CUST',name:cn,address:document.getElementById('cAddr')?.value||'',gstin:document.getElementById('cGstin')?.value||'',pan:document.getElementById('cPan')?.value||'',stateCode:document.getElementById('cState')?.value||'27',phone:'',email:'',type:''};S.customers.push(nc);custId=nc.id;}
  else{const ec=gcu(custId);if(ec){ec.name=cn;ec.address=document.getElementById('cAddr')?.value||ec.address;ec.gstin=document.getElementById('cGstin')?.value||ec.gstin;ec.pan=document.getElementById('cPan')?.value||ec.pan;}}
  const comp=gc(cid),gst=isGstCo(),oD=+(document.getElementById('oDisc')?.value)||0,tt=gst?(document.getElementById('taxType')?.value||'cgst_sgst'):'none',adv=+(document.getElementById('adv')?.value)||0;
  let tAmt=0,tDisc=0,tVal=0,tCg=0,tSg=0,tIg=0;
  const pi=vi.map(l=>{const g=l.qty*l.rate;const ld=g*(l.discPct||0)/100;const ald=g-ld;const od=ald*oD/100;const tv=ald-od;let cg=0,sg=0,ig=0;if(gst){const gr=l.gstRate||0;if(tt==='cgst_sgst'){cg=tv*gr/200;sg=tv*gr/200;}else{ig=tv*gr/100;}}tAmt+=g;tDisc+=ld+od;tVal+=tv;tCg+=cg;tSg+=sg;tIg+=ig;return{...l,gross:g,liDisc:ld,overallDisc:od,taxable:tv,cgst:cg,sgst:sg,igst:ig};});
  const gt=Math.round(tVal+tCg+tSg+tIg-adv);
  const doc={id:edoc?edoc.id:gid('d'),docType:dt,docNumber:edoc?edoc.docNumber:gdn(comp,dt),companyId:cid,customerId:custId,date:document.getElementById('docDt')?.value||td(),items:pi,overallDiscPct:oD,totalAmount:tAmt,totalDiscount:tDisc,taxableValue:tVal,taxType:tt,totalCgst:tCg,totalSgst:tSg,totalIgst:tIg,advance:adv,grandTotal:gt,notes:document.getElementById('docNotes')?.value||'',status:dt==='quotation'?'pending':'final',createdAt:edoc?edoc.createdAt:new Date().toISOString()};
  if(edoc){const idx=S.documents.findIndex(d=>d.id===edoc.id);if(idx>=0)S.documents[idx]=doc;}else S.documents.push(doc);
  sv();toast(dt.charAt(0).toUpperCase()+dt.slice(1)+' '+doc.docNumber+' saved!');edoc=null;LI=[nli()];selCustId='';pvDoc(doc.id);
}

    <button class="bt bp" onclick="dt='${docType}';sp('create')">+ New</button></div>

  `<table><thead><tr><th>Doc #</th><th>Co.</th><th>Customer</th><th>Date</th><th>Amount</th>${docType==='quotation'?'<th>Status</th>':''}<th>Actions</th></tr></thead><tbody>
  ${docs.map(d=>{const co=gc(d.companyId),cu=gcu(d.customerId);return`<tr>
    <td style="font-weight:600;font-size:11.5px">${d.docNumber}</td>

    <td><div class="ca">
      <button class="bt bsm bo" onclick="pvDoc('${d.id}')">View</button>
      <button class="bt bsm bo" onclick="dupDoc('${d.id}')">Copy</button>
      ${docType==='quotation'||docType==='proforma'?`<button class="bt bsm bs" onclick="convDoc('${d.id}','invoice')">→INV</button>`:''}
      ${docType==='quotation'?`<button class="bt bsm bw" onclick="convDoc('${d.id}','challan')">→DC</button>`:''}

        ${gst?`<div style="font-size:11px;margin-top:2px">${cust?.gstin?'GSTIN: '+cust.gstin+' | ':''}${cust?.pan?'PAN: '+cust.pan+' | ':''}State: ${cust?.stateCode||'27'}</div>`:''}</div>
      <div class="inv-meta-box" style="text-align:right"><div class="lbl">${doc.docType==='invoice'?'Invoice':doc.docType==='quotation'?'Quote':doc.docType==='challan'?'Challan':'Proforma'} No</div>

    ${Object.values(hm).filter(h=>h.taxable>0).map(h=>`<tr><td>${h.hsn}</td><td>${h.gstRate}%</td><td>${fc(h.taxable)}</td><td>${doc.taxType==='cgst_sgst'?(h.gstRate/2).toFixed(1)+'%':'0%'}</td><td>${doc.taxType==='cgst_sgst'?fc(h.cgst):'₹0.00'}</td><td>${doc.taxType==='cgst_sgst'?(h.gstRate/2).toFixed(1)+'%':'0%'}</td><td>${doc.taxType==='cgst_sgst'?fc(h.sgst):'₹0.00'}</td><td>${doc.taxType==='igst'?h.gstRate+'%':'0%'}</td><td>${doc.taxType==='igst'?fc(h.igst):'₹0.00'}</td></tr>`).join('')}
    </tbody></table>`:''}
    <div class="inv-words">${n2w(doc.grandTotal)}</div>
    <div class="inv-footer"><div class="inv-bank"><div class="title">Bank Details:</div>A/C Name: ${comp.acName}<br>A/C No: ${comp.acNo}<br>IFSC: ${comp.ifsc} | MICR: ${comp.micr}<br>Bank: ${comp.bankName}<br>Branch: ${comp.bankBranch}${comp.upiId?'<br>UPI: '+comp.upiId:''}</div>
      <div class="inv-sign"><div class="for-text">FOR ${comp.name.toUpperCase()}</div><div class="sign-space"></div><div class="prop">PROPRIETOR</div></div></div>
    ${doc.notes?`<div style="margin-top:10px;font-size:10px;color:#666"><b>Notes:</b> ${doc.notes}</div>`:''}
    <div style="margin-top:16px;display:flex;justify-content:space-between;font-size:10px;color:#999"><span>Customer's Seal / Signature</span><span>Computer Generated</span></div>
  </div>`;
}

function handleXlDrop(e){const f=e.dataTransfer.files[0];if(f)handleXlFile(f);}

function handleXlFile(file){
  if(!file)return;
  const ext=file.name.split('.').pop().toLowerCase();
  if(ext==='csv'||ext==='tsv'){
    const reader=new FileReader();
    reader.onload=function(e){
      const sep=ext==='tsv'?'\t':',';
      const parsed=parseCSV(e.target.result,sep);
      xlHeaders=parsed.headers;xlRows=parsed.rows;
      autoMap();xlStep=2;
      const el=document.getElementById('xlContent');if(el)el.innerHTML=rXlMap();
      updateSteps();
      toast(xlRows.length+' rows detected');
    };
    reader.readAsText(file);
  } else {
    const reader=new FileReader();
    reader.onload=function(e){
      try{
        const wb=XLSX.read(e.target.result,{type:'array'});
        const sheetNames=wb.SheetNames;
        if(sheetNames.length>1){
          let h='<div style="margin:16px 0"><b>Multiple sheets found — pick one:</b><div style="margin-top:10px;display:flex;gap:8px;flex-wrap:wrap">';
          sheetNames.forEach(s=>{h+=`<button class="bt bp" onclick="loadXlSheet('${s.replace(/'/g,"\\'")}')" style="margin-bottom:4px">${s}</button>`;});
          h+='</div></div>';
          const el=document.getElementById('xlContent');if(el)el.innerHTML=h;
          window._xlWb=wb;
        } else {
          processXlSheet(wb,sheetNames[0]);
        }
      }catch(err){toast('Error: '+err.message,'error');}
    };
    reader.readAsArrayBuffer(file);
  }
}

function loadXlSheet(name){if(window._xlWb)processXlSheet(window._xlWb,name);}

function processXlSheet(wb,sheetName){
  const ws=wb.Sheets[sheetName];
  const json=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
  if(json.length<2){toast('Sheet appears empty','error');return;}
  let hIdx=0;
  for(let i=0;i<Math.min(json.length,20);i++){
    const nonEmpty=json[i].filter(c=>String(c).trim()).length;
    if(nonEmpty>=2){hIdx=i;break;}
  }
  xlHeaders=json[hIdx].map(h=>String(h).trim()).filter(h=>h);
  const colCount=xlHeaders.length;
  xlRows=json.slice(hIdx+1).filter(r=>r.some(c=>String(c).trim())).map(r=>{
    const row=[];for(let i=0;i<colCount;i++)row.push(String(r[i]!=null?r[i]:'').trim());return row;
  });
  autoMap();xlStep=2;
  const el=document.getElementById('xlContent');if(el)el.innerHTML=rXlMap();
  updateSteps();
  toast(xlRows.length+' rows from "'+sheetName+'"');
}

function parseCSV(text,sep){
  const lines=text.split(/\r?\n/).filter(l=>l.trim());
  if(lines.length<2)return{headers:[],rows:[]};
  function splitLine(line){
    const result=[];let cur='',inQ=false;
    for(let i=0;i<line.length;i++){
      if(line[i]==='"'){if(inQ&&line[i+1]==='"'){cur+='"';i++;}else inQ=!inQ;}
      else if(line[i]===sep&&!inQ){result.push(cur.trim());cur='';}
      else cur+=line[i];
    }
    result.push(cur.trim());return result;
  }
  const headers=splitLine(lines[0]).filter(h=>h);
  const colCount=headers.length;
  const rows=lines.slice(1).filter(l=>l.trim()).map(l=>{const r=splitLine(l);return headers.map((_,i)=>(r[i]||'').trim());});
  return{headers,rows};
}

function autoMap(){
  xlColMap={};
  const fields=getFields(xlTab);
  fields.forEach(f=>{
    let best=-1;
    for(let i=0;i<xlHeaders.length;i++){
      const h=xlHeaders[i].toLowerCase().replace(/[^a-z0-9]/g,'');
      for(const a of f.aliases){if(h===a.replace(/[^a-z0-9]/g,'')){best=i;break;}}
      if(best>=0)break;
    }
    xlColMap[f.key]=best;
  });
}

function updateSteps(){
  document.querySelectorAll('.step-item').forEach((s,i)=>{
    s.classList.toggle('active',i<xlStep);
    s.classList.toggle('done',i<xlStep-1);
  });
}

function doXlImport(){
  const fields=getFields(xlTab);
  const mapped=fields.filter(f=>xlColMap[f.key]>=0);
  let count=0;
  const mode=document.querySelector('input[name="xlMode"]:checked')?.value||'append';

  if(xlTab==='cust'){
    const newCusts=[];
    xlRows.forEach((r,i)=>{
      const obj={id:'c'+(S.counters.customerId+i+1),phone:'',email:'',type:'B2C',stateCode:'27'};
      mapped.forEach(f=>{const v=r[xlColMap[f.key]]||'';if(v)obj[f.key]=v;});
      if(!obj.name&&!obj.code)return;
      if(!obj.name)obj.name=obj.code;
      if(!obj.code)obj.code=obj.name.substring(0,10).toUpperCase().replace(/[^A-Z0-9\-]/g,'');
      if(obj.gstin&&obj.gstin.length>=15)obj.type='B2B';
      newCusts.push(obj);count++;
    });
    if(mode==='replace'){S.customers=newCusts;S.counters.customerId=newCusts.length;}
    else{S.counters.customerId+=count;S.customers.push(...newCusts);}
  }
  else if(xlTab==='item'){
    const newItems=[];
    xlRows.forEach((r,i)=>{
      const obj={id:'i'+(S.counters.itemId+i+1),uom:'NOS',gstRate:18,category:'Miscellaneous',rate:0};
      mapped.forEach(f=>{let v=r[xlColMap[f.key]]||'';if(f.key==='rate'||f.key==='gstRate')v=parseFloat(String(v).replace(/[^0-9.]/g,''))||0;if(v!=='')obj[f.key]=v;});
      if(!obj.description)return;
      if(!obj.code)obj.code=obj.description.substring(0,12).toUpperCase().replace(/[^A-Z0-9\-]/g,'');
      newItems.push(obj);count++;
    });
    if(mode==='replace'){S.items=newItems;S.counters.itemId=newItems.length;}
    else{S.counters.itemId+=count;S.items.push(...newItems);}
  }
  else if(xlTab==='comp'){
    xlRows.forEach(r=>{
      const obj={};
      mapped.forEach(f=>{const v=r[xlColMap[f.key]]||'';if(v)obj[f.key]=v;});
      if(!obj.name)return;
      const nameL=obj.name.toLowerCase();
      const match=S.companies.find(c=>c.name.toLowerCase().includes(nameL.split(' ')[0])||nameL.includes(c.name.toLowerCase().split(' ')[0]));
      if(match){
        Object.keys(obj).forEach(k=>{if(obj[k]&&k!=='id')match[k]=obj[k];});count++;
      } else {
        const id=obj.name.substring(0,3).toLowerCase().replace(/[^a-z]/g,'');

  }catch(e){console.error('Firebase init error:',e);fbConnected=false;}

          if(d.documents&&d.documents.length)S.documents=d.documents;
          if(d.counters){

function gsJsonp(url){
  return new Promise((resolve,reject)=>{
    const cbName='_gsCb_'+Date.now()+'_'+Math.random().toString(36).substr(2,5);
    const timeout=setTimeout(()=>{cleanup();reject(new Error('Timed out'));},30000);
    function cleanup(){clearTimeout(timeout);delete window[cbName];const s=document.getElementById(cbName);if(s)s.remove();}
    window[cbName]=function(data){cleanup();resolve(data);};
    const script=document.createElement('script');script.id=cbName;
    script.src=url+'&callback='+cbName;
    script.onerror=function(){cleanup();reject(new Error('Failed. Check URL.'));};
    document.body.appendChild(script);
  });
}

function handleOcrDrop(e){const f=e.dataTransfer.files[0];if(f)handleOcrFile(f);}

function handleOcrFile(file){
  if(!file)return toast('No file selected','error');
  const isPdf=file.type==='application/pdf'||file.name.toLowerCase().endsWith('.pdf');
  if(!isPdf&&!file.type.startsWith('image/'))return toast('Please select an image or PDF file','error');

  if(isPdf){
    handlePdfOcr(file);
    return;
  }
  const reader=new FileReader();
  reader.onload=function(e){
    const el=document.getElementById('xlContent');
    if(!el)return;
    el.innerHTML=`<div style="text-align:center"><img src="${e.target.result}" class="ocr-preview" alt="Uploaded invoice">
      <div class="ocr-progress"><div class="ocr-status" id="ocrStatus">Initializing OCR engine...</div><div class="ocr-bar"><div class="ocr-bar-fill" id="ocrBar" style="width:5%"></div></div></div></div>`;
    xlStep=2;updateSteps();
    runOcr(e.target.result);
  };
  reader.readAsDataURL(file);
}

async function handlePdfOcr(file){
  const el=document.getElementById('xlContent');
  if(!el)return;
  el.innerHTML=`<div style="text-align:center;padding:30px">
    <div style="font-size:48px;margin-bottom:12px">📄</div>
    <div style="font-weight:600;font-size:15px;margin-bottom:8px">${file.name}</div>
    <div class="ocr-progress"><div class="ocr-status" id="ocrStatus">Loading PDF...</div><div class="ocr-bar"><div class="ocr-bar-fill" id="ocrBar" style="width:3%"></div></div></div>
    <div id="pdfPages" style="margin-top:16px;display:flex;gap:8px;flex-wrap:wrap;justify-content:center"></div></div>`;
  xlStep=2;updateSteps();
  const bar=document.getElementById('ocrBar');
  const status=document.getElementById('ocrStatus');
  try{
    if(typeof pdfjsLib==='undefined'){
      if(status)status.textContent='Loading PDF.js library...';
      await new Promise((ok,no)=>{const s=document.createElement('script');s.src='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js';s.onload=()=>{pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';ok();};s.onerror=no;document.head.appendChild(s);});
    }
    const ab=await file.arrayBuffer();
    const pdf=await pdfjsLib.getDocument({data:ab}).promise;
    const totalPages=pdf.numPages;
    if(status)status.textContent=`PDF loaded — ${totalPages} page${totalPages>1?'s':''} found. Rendering...`;
    if(bar)bar.style.width='10%';

    // First try to extract text directly (for digital/text-based PDFs)
    let directText='';
    for(let p=1;p<=totalPages;p++){
      const page=await pdf.getPage(p);
      const tc=await page.getTextContent();
      directText+=tc.items.map(i=>i.str).join(' ')+'\n';
    }
    const directClean=directText.replace(/\s+/g,' ').trim();

    // If PDF has embedded text (>50 chars), use it directly — much faster & more accurate
    if(directClean.length>50){
      if(status)status.textContent='Extracted text directly from PDF (digital PDF detected)';
      if(bar)bar.style.width='90%';
      // Still render first page as preview
      const pg1=await pdf.getPage(1);
      const vp=pg1.getViewport({scale:1.5});
      const canvas=document.createElement('canvas');canvas.width=vp.width;canvas.height=vp.height;
      await pg1.render({canvasContext:canvas.getContext('2d'),viewport:vp}).promise;
      const pagesEl=document.getElementById('pdfPages');
      if(pagesEl){canvas.style.maxWidth='100%';canvas.style.maxHeight='300px';canvas.style.borderRadius='8px';canvas.style.boxShadow='0 2px 8px rgba(0,0,0,.12)';pagesEl.appendChild(canvas);}
      // Reconstruct text with proper line breaks from textContent
      let fullText='';
      for(let p=1;p<=totalPages;p++){
        const page=await pdf.getPage(p);
        const tc=await page.getTextContent();
        let lastY=null;
        tc.items.forEach(item=>{
          const y=Math.round(item.transform[5]);
          if(lastY!==null&&Math.abs(y-lastY)>5)fullText+='\n';
          else if(lastY!==null)fullText+=' ';
          fullText+=item.str;
          lastY=y;
        });
        fullText+='\n';
      }
      ocrRawText=fullText;
      ocrItems=parseOcrText(ocrRawText);
      if(bar)bar.style.width='100%';
      xlStep=3;updateSteps();
      if(el)el.innerHTML=rOcrReview();
      toast(ocrItems.length+' line items extracted from PDF (direct text)','success');
      return;
    }

    // Scanned PDF — render pages to images, then OCR each
    if(status)status.textContent='Scanned PDF detected. Running OCR on each page...';
    const pageImages=[];
    for(let p=1;p<=totalPages;p++){
      const page=await pdf.getPage(p);
      const scale=2;
      const vp=page.getViewport({scale});
      const canvas=document.createElement('canvas');canvas.width=vp.width;canvas.height=vp.height;
      await page.render({canvasContext:canvas.getContext('2d'),viewport:vp}).promise;
      pageImages.push(canvas.toDataURL('image/png'));
      // Show small thumbnails
      const pagesEl=document.getElementById('pdfPages');
      if(pagesEl){
        const thumb=document.createElement('div');
        thumb.style.cssText='text-align:center;font-size:10px;color:var(--tl)';
        const img=document.createElement('img');img.src=canvas.toDataURL('image/jpeg',0.5);img.style.cssText='width:80px;height:auto;border-radius:4px;box-shadow:0 1px 4px rgba(0,0,0,.1);display:block;margin-bottom:2px';
        thumb.appendChild(img);thumb.appendChild(document.createTextNode('Page '+p));pagesEl.appendChild(thumb);
      }
      const pctRender=10+Math.round((p/totalPages)*20);
      if(bar)bar.style.width=pctRender+'%';
    }

    // OCR each page image
    if(typeof Tesseract==='undefined'){
      await new Promise((ok,no)=>{const s=document.createElement('script');s.src='https://cdnjs.cloudflare.com/ajax/libs/tesseract.js/5.1.1/tesseract.min.js';s.onload=ok;s.onerror=no;document.head.appendChild(s);});
    }
    const worker=await Tesseract.createWorker('eng',1,{
      logger:m=>{
        if(m.status&&status)status.textContent=m.status.replace(/_/g,' ');
      }
    });
    let allText='';
    for(let p=0;p<pageImages.length;p++){
      if(status)status.textContent=`OCR page ${p+1} of ${pageImages.length}...`;
      const pctOcr=30+Math.round(((p+1)/pageImages.length)*65);
      if(bar)bar.style.width=pctOcr+'%';
      const{data}=await worker.recognize(pageImages[p]);
      allText+=data.text+'\n';
    }
    await worker.terminate();

    ocrRawText=allText;
    ocrItems=parseOcrText(ocrRawText);
    if(bar)bar.style.width='100%';
    xlStep=3;updateSteps();
    if(el)el.innerHTML=rOcrReview();
    toast(ocrItems.length+' line items extracted from '+totalPages+' PDF page(s)','success');
  }catch(err){
    if(status)status.textContent='PDF processing failed: '+err.message;
    toast('PDF error: '+err.message,'error');
  }
}

async function runOcr(imgData){
  const bar=document.getElementById('ocrBar');
  const status=document.getElementById('ocrStatus');
  try{
    if(typeof Tesseract==='undefined'){
      if(status)status.textContent='Loading Tesseract.js...';
      await new Promise((resolve,reject)=>{
        const s=document.createElement('script');
        s.src='https://cdnjs.cloudflare.com/ajax/libs/tesseract.js/5.1.1/tesseract.min.js';
        s.onload=resolve;s.onerror=reject;document.head.appendChild(s);
      });
    }
    const worker=await Tesseract.createWorker('eng',1,{
      logger:m=>{
        if(m.status&&status)status.textContent=m.status.replace(/_/g,' ');
        if(m.progress!==undefined&&bar)bar.style.width=Math.round(m.progress*100)+'%';
      }
    });
    const{data}=await worker.recognize(imgData);
    ocrRawText=data.text;
    await worker.terminate();
    ocrItems=parseOcrText(ocrRawText);
    xlStep=3;updateSteps();
    const el=document.getElementById('xlContent');
    if(el)el.innerHTML=rOcrReview();
    toast(ocrItems.length+' line items extracted');
  }catch(err){
    if(status)status.textContent='OCR failed: '+err.message;
    toast('OCR error: '+err.message,'error');
  }
}

function pn(s){return parseFloat((s||'0').toString().replace(/,/g,'').replace(/[^\d.\-]/g,''))||0;}
function parseOcrText(text){
  const lines=text.split(/\r?\n/).filter(l=>l.trim());
  const items=[];
  // Skip header-like lines and total/subtotal lines
  const skipRe=/^(sr\.?\s*no|s\.?no|item|description|particulars|qty|quantity|rate|amount|total|sub\s*total|grand|net|round|cgst|sgst|igst|gst|tax|discount|cess|hsn|sac|uom|unit|balance|payment|bank|account|ifsc|upi|note|terms|e\s*&\s*o\.?e|subject|invoice|bill|delivery|quotation|proforma|date|customer|buyer|ship|from|to|place|state|pin|mob|tel|ph|fax|email|gstin|pan|cin|iec|lut|arn|dl\.?\s*no|reg|auth|for\s|thank|page\s)/i;
  const totalRe=/\b(total|sub\s*total|subtotal|grand\s*total|net\s*amount|round\s*off|cgst|sgst|igst|gst\s*amount|tax\s*amount|taxable\s*value|discount|freight|packing|insurance|amount\s*in\s*words|rupees|only)\b/i;

  for(const rawLine of lines){
    // Try pipe-separated first (common in digital PDFs)
    let line=rawLine.trim();
    if(skipRe.test(line)&&!line.match(/\d[\d,]*\.\d{2}\s*$/))continue;
    if(totalRe.test(line)&&!line.match(/^\s*\d+[\.\)\|]/))continue;
    let m;

    // === PIPE-SEPARATED (digital PDFs) ===
    // SrNo | Desc | HSN | Qty | UOM | Rate | Disc | GST% | Amount
    if(line.includes('|')){
      const parts=line.split('|').map(p=>p.trim());
      if(parts.length>=4){
        // Find numeric parts from right
        const nums=parts.filter(p=>/^\d/.test(p.replace(/,/g,'')));
        if(nums.length>=2){
          const descParts=parts.filter(p=>!/^\d/.test(p.replace(/,/g,''))&&p.length>1);
          const desc=descParts.join(' ').replace(/^\d+[\.\)]\s*/,'').trim();
          if(desc.length>1){
            const amt=pn(nums[nums.length-1]),rate=pn(nums.length>=3?nums[nums.length-2]:nums[nums.length-1]),qty=pn(nums.length>=3?nums[0]:1);
            const hsn=(parts.find(p=>/^\d{4,8}$/.test(p.trim()))||'').trim();
            const uom=(parts.find(p=>/^(nos|pcs|mtr|rft|ft|kg|set|lot|box|pkt|sqm|sqft|pair|ltr|roll|bundle|unit|ea|no|pc|each)\s*$/i.test(p.trim()))||'').trim().toUpperCase()||'NOS';
            items.push({description:desc,hsn,uom,qty:qty||1,rate:rate||amt,amount:amt||0});continue;
          }
        }
      }
    }

    // === TAB-SEPARATED ===
    if(line.includes('\t')){
      const parts=line.split('\t').map(p=>p.trim()).filter(Boolean);
      if(parts.length>=3){
        const desc=parts[0].replace(/^\d+[\.\)]\s*/,'').trim();
        if(desc.length>1&&!/^\d+$/.test(desc)){
          const nums=parts.slice(1).map(p=>pn(p)).filter(n=>n>0);
          if(nums.length>=2){
            const amt=nums[nums.length-1],rate=nums.length>=3?nums[nums.length-2]:nums[0],qty=nums.length>=3?nums[0]:1;
            items.push({description:desc,hsn:'',uom:'NOS',qty,rate,amount:amt});continue;
          }
        }
      }
    }

    // === STANDARD SPACE-SEPARATED PATTERNS ===

    // P1: SrNo, Desc, HSN, Qty, UOM, Rate, Disc%, GST%, Taxable, CGST, SGST, Total (full GST invoice)
    m=line.match(/^\s*\d+[\.\)]\s*(.+?)\s+(\d{4,8})\s+(\d+(?:\.\d+)?)\s+(nos|pcs|mtr|rft|ft|kg|set|lot|box|pkt|sqm|sqft|pair|ltr|roll|bundle|unit)\s+(\d[\d,]*(?:\.\d+)?)\s+.*?(\d[\d,]*(?:\.\d+)?)\s*$/i);
    if(m){items.push({description:m[1].trim(),hsn:m[2],qty:pn(m[3]),uom:m[4].toUpperCase(),rate:pn(m[5]),amount:pn(m[6])});continue;}

    // P2: SrNo, Desc, HSN, Qty, Rate, Amount
    m=line.match(/^\s*\d+[\.\)]\s*(.+?)\s+(\d{4,8})\s+(\d+(?:\.\d+)?)\s+(\d[\d,]*(?:\.\d+)?)\s+(\d[\d,]*(?:\.\d+)?)\s*$/);
    if(m){items.push({description:m[1].trim(),hsn:m[2],qty:pn(m[3]),uom:'NOS',rate:pn(m[4]),amount:pn(m[5])});continue;}

    // P3: SrNo, Desc, Qty, UOM, Rate, Amount
    m=line.match(/^\s*\d+[\.\)]\s*(.+?)\s+(\d+(?:\.\d+)?)\s+(nos|pcs|mtr|rft|ft|kg|set|lot|box|pkt|sqm|sqft|pair|ltr|roll|bundle|unit)\s+(\d[\d,]*(?:\.\d+)?)\s+(\d[\d,]*(?:\.\d+)?)\s*$/i);
    if(m){items.push({description:m[1].trim(),hsn:'',qty:pn(m[2]),uom:m[3].toUpperCase(),rate:pn(m[4]),amount:pn(m[5])});continue;}

    // P4: SrNo, Desc, Qty, Rate, Amount (basic)
    m=line.match(/^\s*\d+[\.\)\-]\s*(.+?)\s+(\d+(?:\.\d+)?)\s+(\d[\d,]*(?:\.\d+)?)\s+(\d[\d,]*(?:\.\d+)?)\s*$/);
    if(m){items.push({description:m[1].trim(),hsn:'',uom:'NOS',qty:pn(m[2]),rate:pn(m[3]),amount:pn(m[4])});continue;}

    // P5: Desc, Qty, Rate, Amount (no sr.no, starts with letter)
    m=line.match(/^([A-Za-z].{2,}?)\s+(\d+(?:\.\d+)?)\s+(\d[\d,]*(?:\.\d+)?)\s+(\d[\d,]*(?:\.\d+)?)\s*$/);
    if(m&&pn(m[4])>0){items.push({description:m[1].trim(),hsn:'',uom:'NOS',qty:pn(m[2]),rate:pn(m[3]),amount:pn(m[4])});continue;}

    // P6: Desc, Qty x Rate = Amount  e.g. "Widget 10 x 250 = 2500"
    m=line.match(/^(.+?)\s+(\d+(?:\.\d+)?)\s*[xX×]\s*(\d[\d,]*(?:\.\d+)?)\s*[=\-]\s*(\d[\d,]*(?:\.\d+)?)/);
    if(m){items.push({description:m[1].replace(/^\d+[\.\)]\s*/,'').trim(),hsn:'',uom:'NOS',qty:pn(m[2]),rate:pn(m[3]),amount:pn(m[4])});continue;}

    // P7: Desc @ Rate × Qty = Amount  e.g. "Wire @16/m x 100m = 1600"
    m=line.match(/^(.+?)\s*@\s*(\d[\d,]*(?:\.\d+)?)\s*[\/\w]*\s*[xX×]\s*(\d+(?:\.\d+)?)\s*[=\-]?\s*(\d[\d,]*(?:\.\d+)?)?/);
    if(m){const r=pn(m[2]),q=pn(m[3]);items.push({description:m[1].trim(),hsn:'',uom:'NOS',qty:q,rate:r,amount:pn(m[4])||Math.round(q*r*100)/100});continue;}

    // P8: SrNo Desc HSN Qty UOM Rate Disc GST% CGST SGST Total (long GST format with numbers everywhere)
    m=line.match(/^\s*\d+[\.\)]\s*(.{3,}?)\s+(\d{4,8})\s+(\d+(?:\.\d+)?)\s+(\w+)\s+(\d[\d,]*(?:\.\d+)?)\s+\d+(?:\.\d+)?%?\s+\d+(?:\.\d+)?%?\s+(\d[\d,]*(?:\.\d+)?)\s+(\d[\d,]*(?:\.\d+)?)\s+(\d[\d,]*(?:\.\d+)?)\s*$/);
    if(m){items.push({description:m[1].trim(),hsn:m[2],qty:pn(m[3]),uom:m[4].toUpperCase(),rate:pn(m[5]),amount:pn(m[8])});continue;}

    // P9: Description and amount only (qty=1, rate=amount) — last resort
    m=line.match(/^([A-Za-z].{3,}?)\s+(\d[\d,]*(?:\.\d{2})?)\s*$/);
    if(m&&pn(m[2])>1){
      const amt=pn(m[2]);
      items.push({description:m[1].trim(),hsn:'',uom:'NOS',qty:1,rate:amt,amount:amt});continue;
    }

    // P10: Comma-separated: "1, Widget, 8536, 10, NOS, 250.00, 2500.00"
    if(line.includes(',')){
      const parts=line.split(',').map(p=>p.trim());
      if(parts.length>=4){
        const descParts=parts.filter(p=>!/^\d[\d,]*(\.\d+)?$/.test(p)&&p.length>1&&!/^(nos|pcs|mtr|rft|ft|kg|set)$/i.test(p));
        const nums=parts.filter(p=>/^\d[\d,]*(\.\d+)?$/.test(p)).map(p=>pn(p));
        if(descParts.length>=1&&nums.length>=2){
          const amt=nums[nums.length-1],rate=nums.length>=3?nums[nums.length-2]:nums[0],qty=nums.length>=3?nums[0]:1;
          items.push({description:descParts.join(' ').replace(/^\d+[\.\)]\s*/,'').trim(),hsn:'',uom:'NOS',qty:qty||1,rate,amount:amt});continue;
        }
      }
    }
  }

  // Smart match against existing item master
  items.forEach(it=>{
    if(!it.hsn||!it.uom||it.uom==='NOS'){
      const desc=it.description.toLowerCase();
      const match=S.items.find(x=>{
        const d=x.description.toLowerCase(),c=(x.code||'').toLowerCase();
        return d===desc||desc.includes(d)||d.includes(desc)||c===desc||desc.includes(c.replace(/-/g,' '));
      });
      if(match){
        if(!it.hsn)it.hsn=match.hsn||'';
        if(it.uom==='NOS'&&match.uom)it.uom=match.uom;
        it.gstRate=match.gstRate||18;
        it.matchedItemId=match.id;
        it.matchedCode=match.code;
      }
    }
  });

  // Validate: auto-correct amounts where qty*rate is close
  items.forEach(it=>{
    const calc=it.qty*it.rate;
    if(Math.abs(calc-it.amount)>1&&calc>0)it.amount=Math.round(calc*100)/100;
    if(!it.hsn)it.hsn='';
    if(!it.uom)it.uom='NOS';
    if(!it.gstRate)it.gstRate=18;
  });
  return items;
}

function rOcrReview(){
  let h=`<div class="imp-stats">
    <div class="imp-stat"><b>${ocrItems.length}</b>Items extracted</div>
    <div class="imp-stat"><b>${ocrRawText.split(/\r?\n/).filter(l=>l.trim()).length}</b>Text lines</div>
  </div>`;
  // Company / Customer / Doc type selectors
  h+=`<div class="fr f3" style="margin-bottom:12px">
    <div class="fg"><label>Company</label><select id="ocrCo">${S.companies.map(c=>`<option value="${c.id}">${c.name}</option>`).join('')}</select></div>
    <div class="fg"><label>Customer</label><select id="ocrCust"><option value="">— Select —</option>${S.customers.map(c=>`<option value="${c.id}">${c.code||''} — ${c.name||''}</option>`).join('')}</select></div>
    <div class="fg"><label>Doc Type</label><select id="ocrDocType"><option value="invoice">Tax Invoice</option><option value="quotation">Quotation</option><option value="challan">Delivery Challan</option><option value="proforma">Proforma Invoice</option></select></div>
  </div>`;
  // Editable items table
  if(ocrItems.length){
    const matched=ocrItems.filter(it=>it.matchedItemId).length;
    h+=`<div style="font-size:12px;font-weight:600;margin-bottom:6px">Extracted Line Items <span style="font-weight:400;color:var(--tl)">(edit as needed)</span>${matched?` <span class="badge bg" style="font-size:10px">${matched} matched to master</span>`:''}</div>
    <div style="max-height:360px;overflow-y:auto;border:1px solid var(--b);border-radius:8px">
    <table class="ocr-edit-table"><thead><tr><th style="width:5%">#</th><th style="width:30%">Description</th><th style="width:8%">HSN</th><th style="width:7%">Qty</th><th style="width:8%">UOM</th><th style="width:12%">Rate</th><th style="width:7%">GST%</th><th style="width:13%">Amount</th><th style="width:5%"></th></tr></thead><tbody>`;
    ocrItems.forEach((it,i)=>{
      const matchBg=it.matchedItemId?'background:#f0fdf4;':'';
      h+=`<tr id="ocrRow${i}" style="${matchBg}"><td style="text-align:center;color:var(--tl);font-size:11px">${i+1}${it.matchedCode?'<br><span style="font-size:9px;color:var(--s)">'+it.matchedCode+'</span>':''}</td>
        <td><input value="${(it.description||'').replace(/"/g,'&quot;')}" onchange="ocrItems[${i}].description=this.value" style="font-weight:500"></td>
        <td><input value="${it.hsn||''}" onchange="ocrItems[${i}].hsn=this.value" style="font-size:11px;text-align:center"></td>
        <td><input type="number" value="${it.qty}" min="0" step="any" onchange="ocrItems[${i}].qty=+this.value;ocrRecalcRow(${i})" style="text-align:center"></td>
        <td><input value="${it.uom||'NOS'}" onchange="ocrItems[${i}].uom=this.value" style="text-align:center;font-size:11px"></td>
        <td><input type="number" value="${it.rate}" min="0" step="any" onchange="ocrItems[${i}].rate=+this.value;ocrRecalcRow(${i})" style="text-align:right"></td>
        <td><input type="number" value="${it.gstRate||18}" min="0" step="1" onchange="ocrItems[${i}].gstRate=+this.value" style="text-align:center;font-size:11px"></td>
        <td><input type="number" value="${it.amount}" min="0" step="any" id="ocrAmt${i}" onchange="ocrItems[${i}].amount=+this.value" style="text-align:right;font-weight:600"></td>
        <td><button class="rl" onclick="ocrItems.splice(${i},1);document.getElementById('xlContent').innerHTML=rOcrReview();">×</button></td></tr>`;
    });
    h+=`</tbody></table></div>`;
    const total=ocrItems.reduce((s,it)=>s+(it.amount||0),0);
    h+=`<div style="text-align:right;margin-top:8px;font-size:14px;font-weight:700;color:var(--p)">Total: ₹${total.toLocaleString('en-IN',{minimumFractionDigits:2})}</div>`;
  } else {
    h+=`<div style="padding:20px;text-align:center;color:var(--tl)">No line items auto-detected. You can add items manually below, or check the raw text to copy data.</div>`;
  }
  // Add row button
  h+=`<div style="margin:10px 0"><button class="bt bo bsm" onclick="ocrItems.push({description:'',qty:1,uom:'NOS',rate:0,amount:0});document.getElementById('xlContent').innerHTML=rOcrReview();">+ Add Row</button></div>`;
  // Raw text toggle
  h+=`<details style="margin:10px 0"><summary style="cursor:pointer;font-size:12px;font-weight:600;color:var(--tl)">View Raw OCR Text</summary><div class="ocr-raw">${ocrRawText.replace(/</g,'&lt;')}</div></details>`;
  // Action buttons
  h+=`<div style="margin-top:16px;display:flex;justify-content:space-between">
    <button class="bt bo" onclick="xlStep=1;ocrItems=[];ocrRawText='';rp()">← Start Over</button>
    <button class="bt bs blg" onclick="doOcrGenerate()">📄 Generate Document</button></div>`;
  return h;
}

function ocrRecalcRow(i){
  const it=ocrItems[i];if(!it)return;
  it.amount=Math.round(it.qty*it.rate*100)/100;
  const el=document.getElementById('ocrAmt'+i);if(el)el.value=it.amount;
}

function doOcrGenerate(){
  const coId=document.getElementById('ocrCo')?.value;
  const custId=document.getElementById('ocrCust')?.value;
  const docType=document.getElementById('ocrDocType')?.value||'invoice';
  if(!custId){toast('Please select a customer','error');return;}
  if(!ocrItems.length){toast('No items to generate','error');return;}
  const items=ocrItems.filter(it=>it.description).map(it=>{
    const obj={itemId:it.matchedItemId||'',code:it.matchedCode||'',description:it.description,hsn:it.hsn||'',qty:it.qty||1,uom:it.uom||'NOS',rate:it.rate||0,discPct:0,gstRate:it.gstRate||18};
    // If not already matched, try to match with existing items
    if(!obj.itemId){
      const desc=it.description.toLowerCase();
      const mi=S.items.find(x=>(x.description||'').toLowerCase()===desc||(x.description||'').toLowerCase().includes(desc.substring(0,Math.min(15,desc.length))));
      if(mi){obj.itemId=mi.id;obj.code=mi.code;if(!obj.hsn)obj.hsn=mi.hsn;obj.gstRate=mi.gstRate||obj.gstRate;if(obj.uom==='NOS'&&mi.uom)obj.uom=mi.uom;}
    }
    return obj;
  });
  if(!items.length){toast('No valid items','error');return;}
  cid=coId;dt=docType;LI=items;selCustId=custId;edoc=null;
  sv();sp('create');
  setTimeout(()=>{pickCust(custId);recalc();},100);
  toast(items.length+' items loaded into new '+docType,'success');
  ocrItems=[];ocrRawText='';
}

    }else{
      toast('Using local data (Firebase unavailable)','warning');
    }
  }
  sp('dash');
})();
</script>
