<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚡ Bill Manager - MAC | Pinto | PJ Electricals</title>
<style>
:root{--p:#1a56db;--pl:#e8effc;--pd:#1442a8;--s:#059669;--w:#d97706;--d:#dc2626;--bg:#f3f4f6;--c:#fff;--t:#1f2937;--tl:#6b7280;--b:#e5e7eb;--sh:0 1px 3px rgba(0,0,0,.1);--shl:0 10px 15px -3px rgba(0,0,0,.1);--r:8px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--t);min-height:100vh}
/* Sidebar */
.sb{position:fixed;left:0;top:0;bottom:0;width:220px;background:linear-gradient(180deg,#1e293b,#0f172a);color:#fff;z-index:100;overflow-y:auto}
.sb-hd{padding:16px;border-bottom:1px solid rgba(255,255,255,.1)}
.sb-hd h2{font-size:15px;font-weight:700;color:#60a5fa}
.sb-hd p{font-size:10px;color:#94a3b8;margin-top:3px}
.sb nav{padding:8px 0}
.ns{padding:8px 16px 3px;font-size:9px;text-transform:uppercase;letter-spacing:1px;color:#64748b;font-weight:600}
.ni{display:flex;align-items:center;padding:9px 16px;cursor:pointer;transition:all .12s;color:#cbd5e1;font-size:12.5px;gap:8px}
.ni:hover{background:rgba(255,255,255,.05);color:#fff}
.ni.a{background:rgba(96,165,250,.15);color:#60a5fa;border-right:3px solid #60a5fa}
.ni svg{width:16px;height:16px;flex-shrink:0}
/* Main */
.mn{margin-left:220px;padding:20px;min-height:100vh}
.ph{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;flex-wrap:wrap;gap:8px}
.ph h1{font-size:20px;font-weight:700}
.ph .st{font-size:12px;color:var(--tl)}
/* Card */
.cd{background:var(--c);border-radius:var(--r);box-shadow:var(--sh);padding:20px;margin-bottom:16px}
.ch{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid var(--b)}
.ch h3{font-size:15px;font-weight:600}
/* Buttons */
.bt{display:inline-flex;align-items:center;gap:5px;padding:7px 14px;border:none;border-radius:6px;cursor:pointer;font-size:12.5px;font-weight:500;transition:all .12s;font-family:inherit}
.bp{background:var(--p);color:#fff}.bp:hover{background:var(--pd)}
.bs{background:var(--s);color:#fff}.bs:hover{background:#047857}
.bw{background:var(--w);color:#fff}.bw:hover{background:#b45309}
.bd{background:var(--d);color:#fff}.bd:hover{background:#b91c1c}
.bo{background:transparent;border:1px solid var(--b);color:var(--t)}.bo:hover{background:var(--bg)}
.bsm{padding:4px 9px;font-size:11.5px}
.blg{padding:10px 22px;font-size:14px}
/* Forms */
.fg{margin-bottom:12px}
.fg label{display:block;font-size:11px;font-weight:600;color:var(--tl);margin-bottom:3px;text-transform:uppercase;letter-spacing:.4px}
.fg input,.fg select,.fg textarea{width:100%;padding:7px 10px;border:1px solid var(--b);border-radius:5px;font-size:12.5px;font-family:inherit;transition:border .12s}
.fg input:focus,.fg select:focus{outline:none;border-color:var(--p);box-shadow:0 0 0 2px rgba(26,86,219,.1)}
.fr{display:grid;gap:12px}
.f2{grid-template-columns:1fr 1fr}.f3{grid-template-columns:1fr 1fr 1fr}.f4{grid-template-columns:1fr 1fr 1fr 1fr}
/* Table */
table{width:100%;border-collapse:collapse;font-size:12.5px}
th{background:var(--bg);padding:8px 10px;text-align:left;font-weight:600;font-size:10px;text-transform:uppercase;letter-spacing:.4px;color:var(--tl);border-bottom:2px solid var(--b)}
td{padding:7px 10px;border-bottom:1px solid var(--b)}
.badge{display:inline-block;padding:2px 7px;border-radius:10px;font-size:10.5px;font-weight:600}
.bb{background:#dbeafe;color:#1e40af}.bg{background:#d1fae5;color:#065f46}.by{background:#fef3c7;color:#92400e}.br{background:#fee2e2;color:#991b1b}
/* Stats */
.sg{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px}
.sc{background:var(--c);border-radius:var(--r);padding:16px;box-shadow:var(--sh)}
.sc .lb{font-size:11px;color:var(--tl);font-weight:500}.sc .vl{font-size:26px;font-weight:700;margin-top:3px}.sc .su{font-size:11px;color:var(--tl);margin-top:2px}
/* Quick-create bar */
.qc-bar{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap}
.qc-btn{flex:1;min-width:150px;padding:14px 16px;background:var(--c);border:2px solid var(--b);border-radius:var(--r);cursor:pointer;display:flex;align-items:center;gap:10px;transition:all .15s}
.qc-btn:hover{border-color:var(--p);background:var(--pl);transform:translateY(-1px)}
.qc-btn .qc-icon{font-size:22px}.qc-btn .qc-text{font-size:13px;font-weight:600}.qc-btn .qc-sub{font-size:10px;color:var(--tl)}
/* Smart search / autocomplete */
.ss{position:relative}
.ss input{padding-left:30px;font-size:14px;padding:10px 12px 10px 34px}
.ss .si{position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:16px;color:var(--tl)}
.ss-drop{position:absolute;top:100%;left:0;right:0;background:#fff;border:1px solid var(--b);border-radius:0 0 8px 8px;max-height:250px;overflow-y:auto;z-index:50;box-shadow:var(--shl);display:none}
.ss-drop.show{display:block}
.ss-item{padding:10px 14px;cursor:pointer;border-bottom:1px solid #f3f4f6;transition:background .1s}
.ss-item:hover,.ss-item.hl{background:var(--pl)}
.ss-item .ss-name{font-weight:600;font-size:13px}.ss-item .ss-info{font-size:11px;color:var(--tl);margin-top:2px}
/* Company pills - compact */
.cp{display:inline-flex;gap:6px;margin-bottom:14px}
.cpill{padding:6px 14px;border-radius:16px;cursor:pointer;font-size:12px;font-weight:500;border:2px solid var(--b);background:#fff;transition:all .12s}
.cpill.a{border-color:var(--p);background:var(--pl);color:var(--p)}
.cpill:hover{border-color:var(--p)}
/* Doc type pills */
.dtp{display:inline-flex;gap:6px;margin-bottom:14px}
.dtpill{padding:6px 14px;border-radius:16px;cursor:pointer;font-size:12px;font-weight:500;border:2px solid var(--b);background:#fff;transition:all .12s}
.dtpill.a{border-color:var(--p);background:var(--pl);color:var(--p)}
.dtpill:hover{border-color:var(--p)}
/* Line items - compact table */
.lt{width:100%;border-collapse:collapse;font-size:12px}
.lt th{background:var(--bg);padding:6px 5px;font-size:9.5px;text-align:center;font-weight:600;text-transform:uppercase;letter-spacing:.3px;border-bottom:2px solid var(--b);white-space:nowrap}
.lt td{padding:3px 2px;vertical-align:middle}
.lt input,.lt select{padding:5px 5px;font-size:12px;border:1px solid var(--b);border-radius:4px;width:100%;font-family:inherit}
.lt input:focus,.lt select:focus{outline:none;border-color:var(--p)}
.lt .ro{background:#f9fafb;font-weight:600;text-align:right}
.rl{background:none;border:none;color:var(--d);cursor:pointer;font-size:16px;padding:2px 4px}
.rl:hover{color:#991b1c}
/* Quick item search in line */
.qi{position:relative}
.qi-drop{position:absolute;top:100%;left:0;right:0;background:#fff;border:1px solid var(--b);border-radius:0 0 6px 6px;max-height:180px;overflow-y:auto;z-index:40;box-shadow:var(--shl);display:none;font-size:11px}
.qi-drop.show{display:block}
.qi-item{padding:6px 8px;cursor:pointer;border-bottom:1px solid #f9fafb}
.qi-item:hover{background:var(--pl)}
.qi-item b{color:var(--p)}
/* Summary floating */
.sum-float{position:sticky;bottom:0;background:var(--c);border-top:2px solid var(--p);padding:14px 20px;margin:-20px;margin-top:12px;border-radius:0 0 var(--r) var(--r);z-index:10}
.sum-grid{display:grid;grid-template-columns:1fr auto 1fr;gap:16px;align-items:center}
.sum-total{text-align:center}
.sum-total .big{font-size:24px;font-weight:800;color:var(--p)}
.sum-total .sub{font-size:10px;color:var(--tl)}
.sum-details{font-size:11.5px}
.sum-details .row{display:flex;justify-content:space-between;padding:1px 0}
/* Modal */
.mo{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1000;display:flex;align-items:center;justify-content:center}
.md{background:var(--c);border-radius:12px;max-width:700px;width:95%;max-height:85vh;overflow-y:auto;box-shadow:var(--shl)}
.mh{padding:16px 20px;border-bottom:1px solid var(--b);display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;background:var(--c);z-index:10}
.mh h3{font-size:15px;font-weight:600}
.mc{background:none;border:none;font-size:18px;cursor:pointer;color:var(--tl);padding:4px}
.mb{padding:20px}
.mf{padding:14px 20px;border-top:1px solid var(--b);display:flex;justify-content:flex-end;gap:8px;position:sticky;bottom:0;background:var(--c)}
/* Toast */
.toast{position:fixed;top:16px;right:16px;color:#fff;padding:10px 18px;border-radius:8px;z-index:2000;font-size:12.5px;animation:si .3s}
@keyframes si{from{transform:translateX(80px);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes pulse{from{opacity:.4;width:30%}to{opacity:1;width:80%}}
/* Print */
.inv-header{text-align:center;border-bottom:2px solid #000;padding-bottom:10px;margin-bottom:10px}
.inv-header h1{font-size:20px;font-weight:800;letter-spacing:1px;margin:0}
.inv-header .doc-type{font-size:16px;font-weight:700;margin-bottom:4px;color:#333}
.inv-header .address{font-size:11px;color:#444;margin-top:4px}
.inv-header .contact{font-size:11px;color:#444}
.inv-meta{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:10px 0}
.inv-meta-box{border:1px solid #ccc;padding:8px 10px;border-radius:4px}
.inv-meta-box .lbl{font-size:10px;color:#666;font-weight:600;text-transform:uppercase}
.inv-meta-box .val{font-size:12px;font-weight:600;margin-top:2px}
.inv-table{width:100%;border-collapse:collapse;margin:10px 0}
.inv-table th{background:#f0f0f0;border:1px solid #ccc;padding:5px 6px;font-size:9.5px;text-transform:uppercase;text-align:center}
.inv-table td{border:1px solid #ccc;padding:4px 6px;font-size:11px}
.inv-table .right{text-align:right}.inv-table .center{text-align:center}
.inv-summary{margin:10px 0}.inv-summary table{width:50%;margin-left:auto;border-collapse:collapse}
.inv-summary td{padding:3px 8px;font-size:11px}
.inv-summary .total-row{font-weight:700;font-size:13px;border-top:2px solid #000}
.inv-footer{display:grid;grid-template-columns:1fr 1fr;margin-top:16px;padding-top:10px;border-top:1px solid #ccc}
.inv-bank{font-size:9.5px;line-height:1.5}.inv-bank .title{font-weight:700;font-size:10px;margin-bottom:3px}
.inv-sign{text-align:right}.inv-sign .for-text{font-size:11px;font-weight:600}.inv-sign .sign-space{height:45px}.inv-sign .prop{font-size:11px}
.inv-words{font-size:10.5px;font-style:italic;padding:5px 0;border-top:1px solid #ccc;border-bottom:1px solid #ccc;margin:6px 0}
.inv-gst-table{width:100%;border-collapse:collapse;margin:6px 0;font-size:9.5px}
.inv-gst-table th,.inv-gst-table td{border:1px solid #ccc;padding:3px 5px;text-align:center}
.inv-gst-table th{background:#f0f0f0}
/* Filter */
.fb{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;align-items:center}
.fb input{padding:7px 10px;border:1px solid var(--b);border-radius:6px;font-size:12.5px;min-width:180px}
.fb select{padding:7px 10px;border:1px solid var(--b);border-radius:6px;font-size:12.5px}
/* Chart */
.chart-bar{display:flex;align-items:flex-end;gap:6px;height:100px;padding-top:8px}
.chart-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px}
.chart-col .bar{width:100%;border-radius:4px 4px 0 0;min-height:2px}
.chart-col .bar-label{font-size:9px;color:var(--tl)}.chart-col .bar-value{font-size:9px;font-weight:600}
/* Convert actions */
.ca{display:flex;gap:4px;flex-wrap:wrap}
/* Keyboard hint */
.kh{font-size:9px;color:var(--tl);background:var(--bg);padding:1px 5px;border-radius:3px;margin-left:4px}
/* Responsive */
@media(max-width:900px){.sb{transform:translateX(-100%)}.mn{margin-left:0}.sg{grid-template-columns:1fr 1fr}.f3,.f4{grid-template-columns:1fr 1fr}}
@media(max-width:600px){.f2,.f3,.f4{grid-template-columns:1fr}.sg{grid-template-columns:1fr}}
@media print{.sb,.mn,.no-print{display:none!important}.print-area{display:block!important;margin:0;padding:15px}body{background:#fff}}
.print-area{display:none}
/* Highlighted row */
.lt tr:hover td{background:rgba(26,86,219,.03)}
/* Import UI */
.drop-zone{border:2px dashed var(--b);border-radius:12px;padding:40px 20px;text-align:center;cursor:pointer;transition:all .2s;background:#fafbfc}
.drop-zone:hover,.drop-zone.drag-over{border-color:var(--p);background:var(--pl)}
.drop-zone .dz-icon{font-size:36px;margin-bottom:8px}
.drop-zone .dz-text{font-size:14px;font-weight:600;color:var(--t)}
.drop-zone .dz-sub{font-size:11px;color:var(--tl);margin-top:4px}
.imp-preview{max-height:350px;overflow:auto;margin:12px 0;border:1px solid var(--b);border-radius:8px}
.imp-preview table{font-size:11px;width:100%;border-collapse:collapse}
.imp-preview th{position:sticky;top:0;background:var(--bg);padding:6px 8px;text-align:left;font-size:10px;z-index:2;border-bottom:2px solid var(--b)}
.imp-preview td{padding:4px 8px;border-bottom:1px solid #f3f4f6;white-space:nowrap;max-width:200px;overflow:hidden;text-overflow:ellipsis}
.imp-preview tr:hover td{background:rgba(26,86,219,.04)}
.map-row{display:flex;align-items:center;gap:10px;padding:6px 0;border-bottom:1px solid #f3f4f6}
.map-row .src{font-weight:600;font-size:12px;min-width:140px;color:var(--p)}
.map-row select{padding:5px 8px;font-size:12px;border:1px solid var(--b);border-radius:5px;min-width:160px}
.map-row .arrow{color:var(--tl)}
.imp-stats{display:flex;gap:14px;margin:12px 0;flex-wrap:wrap}
.imp-stat{background:var(--bg);padding:8px 14px;border-radius:8px;font-size:12px}
.imp-stat b{font-size:16px;display:block;margin-bottom:2px}
.step-bar{display:flex;gap:0;margin-bottom:20px}
.step-item{flex:1;text-align:center;padding:10px 8px;font-size:11px;font-weight:600;color:var(--tl);border-bottom:3px solid var(--b);transition:all .15s}
/* OCR / Image import */
.ocr-zone{border:2px dashed var(--b);border-radius:12px;padding:30px 20px;text-align:center;cursor:pointer;transition:all .2s;background:#fafbfc}
.ocr-zone:hover,.ocr-zone.drag-over{border-color:var(--w);background:#fffbeb}
.ocr-preview{max-width:100%;max-height:300px;border-radius:8px;margin:12px auto;display:block;box-shadow:var(--sh)}
.ocr-progress{margin:16px 0;text-align:center}
.ocr-bar{width:100%;height:8px;background:var(--b);border-radius:4px;overflow:hidden;margin:8px 0}
.ocr-bar-fill{height:100%;background:linear-gradient(90deg,var(--w),var(--s));border-radius:4px;transition:width .3s}
.ocr-status{font-size:12px;color:var(--tl);font-weight:500}
.ocr-edit-table{width:100%;border-collapse:collapse;font-size:12px;margin:10px 0}
.ocr-edit-table th{background:var(--bg);padding:6px 8px;text-align:left;font-size:10px;text-transform:uppercase;border-bottom:2px solid var(--b)}
.ocr-edit-table td{padding:4px 6px;border-bottom:1px solid #f3f4f6}
.ocr-edit-table input{width:100%;padding:4px 6px;font-size:12px;border:1px solid var(--b);border-radius:4px;font-family:inherit}
.ocr-edit-table input:focus{outline:none;border-color:var(--p)}
.ocr-raw{background:#1e293b;color:#e2e8f0;padding:14px;border-radius:8px;font-family:'Courier New',monospace;font-size:11px;max-height:200px;overflow-y:auto;white-space:pre-wrap;line-height:1.5;margin:10px 0}
.step-item.active{color:var(--p);border-bottom-color:var(--p);background:var(--pl)}
.step-item.done{color:var(--s);border-bottom-color:var(--s)}
.tab-bar{display:flex;gap:0;border-bottom:2px solid var(--b);margin-bottom:16px}
.tab-btn{padding:9px 18px;cursor:pointer;font-size:12.5px;font-weight:500;color:var(--tl);border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .12s;background:none;border-top:none;border-left:none;border-right:none;font-family:inherit}
.tab-btn.active{color:var(--p);border-bottom-color:var(--p)}
.tab-btn:hover{color:var(--p)}
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/tesseract.js/5.1.1/tesseract.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
</head>
<body>
<div class="sb">
  <div class="sb-hd"><h2>⚡ Bill Manager</h2><p>MAC | Pinto | PJ Electricals</p></div>
  <nav>
    <div class="ns">Main</div>
    <div class="ni a" onclick="sp('dash')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>Dashboard</div>
    <div class="ns">Create</div>
    <div class="ni" onclick="sp('create')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>New Document</div>
    <div class="ns">Records</div>
    <div class="ni" onclick="sp('inv')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><path d="M14 2v6h6"/></svg>Tax Invoices</div>
    <div class="ni" onclick="sp('quo')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/></svg>Quotations</div>
    <div class="ni" onclick="sp('dc')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="1" y="3" width="15" height="13" rx="2"/><path d="M16 8h4l3 3v5a2 2 0 01-2 2h-1"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg>Delivery Challans</div>
    <div class="ni" onclick="sp('pi')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><path d="M14 2v6h6M12 18v-6M9 15l3 3 3-3"/></svg>Proforma Invoices</div>
    <div class="ns">Masters</div>
    <div class="ni" onclick="sp('cust')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>Customers</div>
    <div class="ni" onclick="sp('item')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.59 13.41l-7.17 7.17a2 2 0 01-2.83 0L2 12V2h10l8.59 8.59a2 2 0 010 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></svg>Items</div>
    <div class="ni" onclick="sp('co')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>Company Settings</div>
    <div class="ns">Import / Export</div>
    <div class="ni" onclick="sp('xlimport')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><path d="M14 2v6h6"/><path d="M8 13h2l2 3 2-5h2"/></svg>Import Excel / CSV</div>
    <div class="ni" onclick="expData()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>Export JSON</div>

// Helpers
function gid(p){return p+'_'+Date.now()+'_'+Math.random().toString(36).substr(2,4);}
function gc(id){return S.companies.find(c=>c.id===id);}
function gcu(id){return S.customers.find(c=>c.id===id);}
function gi(id){return S.items.find(i=>i.id===id);}
function fc(n){return'₹'+Number(n||0).toLocaleString('en-IN',{minimumFractionDigits:2,maximumFractionDigits:2});}
function fd(d){if(!d)return'';return new Date(d).toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'});}
function td(){return new Date().toISOString().split('T')[0];}
function getFY(){const n=new Date(),y=n.getFullYear(),m=n.getMonth();return m>=3?`${(y%100).toString().padStart(2,'0')}-${((y+1)%100).toString().padStart(2,'0')}`:`${((y-1)%100).toString().padStart(2,'0')}-${(y%100).toString().padStart(2,'0')}`;}
function gdn(c,dt){const fy=getFY();let pf=c.invoicePrefix,k;switch(dt){case'invoice':k='nextInvoiceNo';break;case'quotation':k='nextQuoteNo';pf+='/Q';break;case'challan':k='nextChallanNo';pf+='/DC';break;case'proforma':k='nextProformaNo';pf+='/PI';break;}const n=String(c[k]).padStart(3,'0');c[k]++;sv();return`${pf}/${fy}/${n}`;}
function n2w(num){if(!num||num===0)return'ZERO';const o=['','ONE','TWO','THREE','FOUR','FIVE','SIX','SEVEN','EIGHT','NINE','TEN','ELEVEN','TWELVE','THIRTEEN','FOURTEEN','FIFTEEN','SIXTEEN','SEVENTEEN','EIGHTEEN','NINETEEN'];const t=['','','TWENTY','THIRTY','FORTY','FIFTY','SIXTY','SEVENTY','EIGHTY','NINETY'];function cv(n){if(n<20)return o[n];if(n<100)return t[Math.floor(n/10)]+(n%10?' '+o[n%10]:'');if(n<1000)return o[Math.floor(n/100)]+' HUNDRED'+(n%100?' AND '+cv(n%100):'');if(n<100000)return cv(Math.floor(n/1000))+' THOUSAND'+(n%1000?' '+cv(n%1000):'');if(n<10000000)return cv(Math.floor(n/100000))+' LAKH'+(n%100000?' '+cv(n%100000):'');return cv(Math.floor(n/10000000))+' CRORE'+(n%10000000?' '+cv(n%10000000):'');}return'RUPEES '+cv(Math.round(num))+' ONLY.';}
function toast(m,tp='success'){const t=document.createElement('div');t.className='toast';t.style.background=tp==='error'?'#dc2626':tp==='warning'?'#d97706':'#065f46';t.textContent=m;document.body.appendChild(t);setTimeout(()=>t.remove(),3000);}

// Customer search
function searchCust(q){

  if(!q||q.length<1){drop.classList.remove('show');return;}

  const matches=S.customers.filter(c=>c.name.toLowerCase().includes(q)||c.code.toLowerCase().includes(q)||c.address.toLowerCase().includes(q)).slice(0,12);
  if(!matches.length){drop.innerHTML='<div style="padding:10px;color:var(--tl);font-size:12px">No match. Details will be saved as new customer.</div>';drop.classList.add('show');return;}
  drop.innerHTML=matches.map(c=>`<div class="ss-item" onclick="pickCust('${c.id}')"><div class="ss-name">${c.code} — ${c.name}</div><div class="ss-info">${c.address}${c.gstin?' | GSTIN: '+c.gstin:''}</div></div>`).join('');
  drop.classList.add('show');
}
function pickCust(id){
  selCustId=id;const c=gcu(id);if(!c)return;
  document.getElementById('custSearch').value=c.code+' — '+c.name;
  document.getElementById('custDrop').classList.remove('show');

  document.getElementById('cCode').value=c.code;
  document.getElementById('cName').value=c.name;
  document.getElementById('cAddr').value=c.address;

function searchItem(i,q){

function pickItem(i,id){
  const it=gi(id);if(!it)return;
  LI[i]={itemId:it.id,code:it.code,description:it.description,hsn:it.hsn,qty:LI[i].qty||1,uom:it.uom,rate:it.rate,discPct:LI[i].discPct||0,gstRate:it.gstRate||18};
  document.getElementById('qid'+i).classList.remove('show');
  rfLI();recalc();

function addLI(n=1){for(let j=0;j<n;j++)LI.push(nli());rfLI();}
function remLI(i){if(LI.length<=1)return;LI.splice(i,1);rfLI();recalc();}
function rfLI(){const b=document.getElementById('liBody');if(b)b.innerHTML=LI.map((l,i)=>liRow(l,i)).join('');}

function recalc(){
  const gst=isGstCo();
  const oD=+(document.getElementById('oDisc')?.value)||0;
  const tt=gst?(document.getElementById('taxType')?.value||'cgst_sgst'):'none';
  const adv=+(document.getElementById('adv')?.value)||0;
  let tAmt=0,tDisc=0,tTax=0,tCgst=0,tSgst=0,tIgst=0,tVal=0;
  LI.forEach(l=>{const g=l.qty*l.rate;const ld=g*(l.discPct||0)/100;const ald=g-ld;const od=ald*oD/100;const tv=ald-od;
    let cg=0,sg=0,ig=0;
    if(gst){const gr=l.gstRate||0;if(tt==='cgst_sgst'){cg=tv*gr/200;sg=tv*gr/200;}else{ig=tv*gr/100;}}
    tAmt+=g;tDisc+=ld+od;tVal+=tv;tCgst+=cg;tSgst+=sg;tIgst+=ig;});
  tTax=tCgst+tSgst+tIgst;const gt=Math.round(tVal+tTax-adv);
  const el=document.getElementById('sumDisp');if(!el)return;
  el.innerHTML=`<div class="sum-float"><div class="sum-grid">
    <div class="sum-details">
      <div class="row"><span>Gross:</span><span>${fc(tAmt)}</span></div>
      ${tDisc>0?`<div class="row"><span>Discount:</span><span style="color:var(--d)">-${fc(tDisc)}</span></div>`:''}
      <div class="row"><span><b>${gst?'Taxable':'Net Amount'}:</b></span><span><b>${fc(tVal)}</b></span></div>
    </div>
    <div class="sum-total"><div class="big">${fc(gt)}</div><div class="sub">${n2w(gt)}</div></div>
    <div class="sum-details">
      ${gst?(tt==='cgst_sgst'?`<div class="row"><span>CGST:</span><span>${fc(tCgst)}</span></div><div class="row"><span>SGST:</span><span>${fc(tSgst)}</span></div>`:`<div class="row"><span>IGST:</span><span>${fc(tIgst)}</span></div>`):''}
      ${adv>0?`<div class="row"><span>Advance:</span><span style="color:var(--d)">-${fc(adv)}</span></div>`:''}
      ${gst?`<div class="row"><span>Total Tax:</span><span>${fc(tTax)}</span></div>`:''}
    </div>
  </div></div>`;
}

function saveDoc(){
  const cn=document.getElementById('cName')?.value;
  if(!cn){toast('Select or enter a customer','error');return;}
  const vi=LI.filter(l=>l.description&&l.qty>0&&l.rate>0);
  if(!vi.length){toast('Add at least one item','error');return;}
  let custId=selCustId;
  if(!custId){const nc={id:'c'+(++S.counters.customerId),code:document.getElementById('cCode')?.value||'CUST',name:cn,address:document.getElementById('cAddr')?.value||'',gstin:document.getElementById('cGstin')?.value||'',pan:document.getElementById('cPan')?.value||'',stateCode:document.getElementById('cState')?.value||'27',phone:'',email:'',type:''};S.customers.push(nc);custId=nc.id;}
  else{const ec=gcu(custId);if(ec){ec.name=cn;ec.address=document.getElementById('cAddr')?.value||ec.address;ec.gstin=document.getElementById('cGstin')?.value||ec.gstin;ec.pan=document.getElementById('cPan')?.value||ec.pan;}}
  const comp=gc(cid),gst=isGstCo(),oD=+(document.getElementById('oDisc')?.value)||0,tt=gst?(document.getElementById('taxType')?.value||'cgst_sgst'):'none',adv=+(document.getElementById('adv')?.value)||0;
  let tAmt=0,tDisc=0,tVal=0,tCg=0,tSg=0,tIg=0;
  const pi=vi.map(l=>{const g=l.qty*l.rate;const ld=g*(l.discPct||0)/100;const ald=g-ld;const od=ald*oD/100;const tv=ald-od;let cg=0,sg=0,ig=0;if(gst){const gr=l.gstRate||0;if(tt==='cgst_sgst'){cg=tv*gr/200;sg=tv*gr/200;}else{ig=tv*gr/100;}}tAmt+=g;tDisc+=ld+od;tVal+=tv;tCg+=cg;tSg+=sg;tIg+=ig;return{...l,gross:g,liDisc:ld,overallDisc:od,taxable:tv,cgst:cg,sgst:sg,igst:ig};});
  const gt=Math.round(tVal+tCg+tSg+tIg-adv);
  const doc={id:edoc?edoc.id:gid('d'),docType:dt,docNumber:edoc?edoc.docNumber:gdn(comp,dt),companyId:cid,customerId:custId,date:document.getElementById('docDt')?.value||td(),items:pi,overallDiscPct:oD,totalAmount:tAmt,totalDiscount:tDisc,taxableValue:tVal,taxType:tt,totalCgst:tCg,totalSgst:tSg,totalIgst:tIg,advance:adv,grandTotal:gt,notes:document.getElementById('docNotes')?.value||'',status:dt==='quotation'?'pending':'final',createdAt:edoc?edoc.createdAt:new Date().toISOString()};
  if(edoc){const idx=S.documents.findIndex(d=>d.id===edoc.id);if(idx>=0)S.documents[idx]=doc;}else S.documents.push(doc);
  sv();toast(dt.charAt(0).toUpperCase()+dt.slice(1)+' '+doc.docNumber+' saved!');edoc=null;LI=[nli()];selCustId='';pvDoc(doc.id);
}

function handleXlDrop(e){const f=e.dataTransfer.files[0];if(f)handleXlFile(f);}

function handleXlFile(file){
  if(!file)return;
  const ext=file.name.split('.').pop().toLowerCase();
  if(ext==='csv'||ext==='tsv'){
    const reader=new FileReader();
    reader.onload=function(e){
      const sep=ext==='tsv'?'\t':',';
      const parsed=parseCSV(e.target.result,sep);
      xlHeaders=parsed.headers;xlRows=parsed.rows;
      autoMap();xlStep=2;
      const el=document.getElementById('xlContent');if(el)el.innerHTML=rXlMap();
      updateSteps();
      toast(xlRows.length+' rows detected');
    };
    reader.readAsText(file);
  } else {
    const reader=new FileReader();
    reader.onload=function(e){
      try{
        const wb=XLSX.read(e.target.result,{type:'array'});
        const sheetNames=wb.SheetNames;
        if(sheetNames.length>1){
          let h='<div style="margin:16px 0"><b>Multiple sheets found — pick one:</b><div style="margin-top:10px;display:flex;gap:8px;flex-wrap:wrap">';
          sheetNames.forEach(s=>{h+=`<button class="bt bp" onclick="loadXlSheet('${s.replace(/'/g,"\\'")}')" style="margin-bottom:4px">${s}</button>`;});
          h+='</div></div>';
          const el=document.getElementById('xlContent');if(el)el.innerHTML=h;
          window._xlWb=wb;
        } else {
          processXlSheet(wb,sheetNames[0]);
        }
      }catch(err){toast('Error: '+err.message,'error');}
    };
    reader.readAsArrayBuffer(file);
  }
}

function loadXlSheet(name){if(window._xlWb)processXlSheet(window._xlWb,name);}

function processXlSheet(wb,sheetName){
  const ws=wb.Sheets[sheetName];
  const json=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
  if(json.length<2){toast('Sheet appears empty','error');return;}
  let hIdx=0;
  for(let i=0;i<Math.min(json.length,20);i++){
    const nonEmpty=json[i].filter(c=>String(c).trim()).length;
    if(nonEmpty>=2){hIdx=i;break;}
  }
  xlHeaders=json[hIdx].map(h=>String(h).trim()).filter(h=>h);
  const colCount=xlHeaders.length;
  xlRows=json.slice(hIdx+1).filter(r=>r.some(c=>String(c).trim())).map(r=>{
    const row=[];for(let i=0;i<colCount;i++)row.push(String(r[i]!=null?r[i]:'').trim());return row;
  });
  autoMap();xlStep=2;
  const el=document.getElementById('xlContent');if(el)el.innerHTML=rXlMap();
  updateSteps();
  toast(xlRows.length+' rows from "'+sheetName+'"');
}

function parseCSV(text,sep){
  const lines=text.split(/\r?\n/).filter(l=>l.trim());
  if(lines.length<2)return{headers:[],rows:[]};
  function splitLine(line){
    const result=[];let cur='',inQ=false;
    for(let i=0;i<line.length;i++){
      if(line[i]==='"'){if(inQ&&line[i+1]==='"'){cur+='"';i++;}else inQ=!inQ;}
      else if(line[i]===sep&&!inQ){result.push(cur.trim());cur='';}
      else cur+=line[i];
    }
    result.push(cur.trim());return result;
  }
  const headers=splitLine(lines[0]).filter(h=>h);
  const colCount=headers.length;
  const rows=lines.slice(1).filter(l=>l.trim()).map(l=>{const r=splitLine(l);return headers.map((_,i)=>(r[i]||'').trim());});
  return{headers,rows};
}

function autoMap(){
  xlColMap={};
  const fields=getFields(xlTab);
  fields.forEach(f=>{
    let best=-1;
    for(let i=0;i<xlHeaders.length;i++){
      const h=xlHeaders[i].toLowerCase().replace(/[^a-z0-9]/g,'');
      for(const a of f.aliases){if(h===a.replace(/[^a-z0-9]/g,'')){best=i;break;}}
      if(best>=0)break;
    }
    xlColMap[f.key]=best;
  });
}

function updateSteps(){
  document.querySelectorAll('.step-item').forEach((s,i)=>{
    s.classList.toggle('active',i<xlStep);
    s.classList.toggle('done',i<xlStep-1);
  });
}

function rXlMap(){
  const fields=getFields(xlTab);
  let h=`<div style="margin-bottom:14px"><b>${xlRows.length} rows detected</b> · Map your Excel columns to the right fields below</div>`;
  h+='<div style="max-height:360px;overflow-y:auto">';
  fields.forEach(f=>{
    h+=`<div class="map-row"><span class="src">${f.label}</span><span class="arrow">←</span>
    <select onchange="xlColMap['${f.key}']=+this.value"><option value="-1">— skip —</option>`;
    xlHeaders.forEach((hdr,i)=>{h+=`<option value="${i}" ${xlColMap[f.key]===i?'selected':''}>${hdr}</option>`;});
    h+='</select>';
    if(xlColMap[f.key]>=0){const ci=xlColMap[f.key];const samples=xlRows.slice(0,3).map(r=>r[ci]).filter(v=>v).join(', ');h+=`<span style="font-size:10px;color:var(--tl);margin-left:8px;max-width:220px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;display:inline-block;vertical-align:middle">${samples}</span>`;}
    h+='</div>';
  });
  h+='</div>';
  h+=`<div style="margin-top:16px;display:flex;justify-content:space-between">
    <button class="bt bo" onclick="xlStep=1;rp()">← Back</button>
    <button class="bt bp blg" onclick="goXlPreview()">Preview →</button></div>`;
  return h;
}

function goXlPreview(){

  showRows.forEach(r=>{
    h+='<tr>';mapped.forEach(f=>{h+=`<td>${r[xlColMap[f.key]]||'—'}</td>`;});h+='</tr>';
  });
  if(xlRows.length>25)h+=`<tr><td colspan="${mapped.length}" style="text-align:center;color:var(--tl);font-style:italic">...and ${xlRows.length-25} more rows</td></tr>`;
  h+='</tbody></table></div>';

  h+=`<div style="margin-top:16px;display:flex;justify-content:space-between">
    <button class="bt bo" onclick="xlStep=2;document.getElementById('xlContent').innerHTML=rXlMap();updateSteps();">← Back</button>
    <button class="bt bs blg" onclick="doXlImport()">✅ Import ${xlRows.length} Rows</button></div>`;
  return h;
}

function doXlImport(){
  const fields=getFields(xlTab);
  const mapped=fields.filter(f=>xlColMap[f.key]>=0);
  let count=0;
  const mode=document.querySelector('input[name="xlMode"]:checked')?.value||'append';

  if(xlTab==='cust'){
    const newCusts=[];
    xlRows.forEach((r,i)=>{
      const obj={id:'c'+(S.counters.customerId+i+1),phone:'',email:'',type:'B2C',stateCode:'27'};
      mapped.forEach(f=>{const v=r[xlColMap[f.key]]||'';if(v)obj[f.key]=v;});
      if(!obj.name&&!obj.code)return;
      if(!obj.name)obj.name=obj.code;
      if(!obj.code)obj.code=obj.name.substring(0,10).toUpperCase().replace(/[^A-Z0-9\-]/g,'');
      if(obj.gstin&&obj.gstin.length>=15)obj.type='B2B';
      newCusts.push(obj);count++;
    });
    if(mode==='replace'){S.customers=newCusts;S.counters.customerId=newCusts.length;}
    else{S.counters.customerId+=count;S.customers.push(...newCusts);}
  }
  else if(xlTab==='item'){
    const newItems=[];
    xlRows.forEach((r,i)=>{
      const obj={id:'i'+(S.counters.itemId+i+1),uom:'NOS',gstRate:18,category:'Miscellaneous',rate:0};
      mapped.forEach(f=>{let v=r[xlColMap[f.key]]||'';if(f.key==='rate'||f.key==='gstRate')v=parseFloat(String(v).replace(/[^0-9.]/g,''))||0;if(v!=='')obj[f.key]=v;});
      if(!obj.description)return;
      if(!obj.code)obj.code=obj.description.substring(0,12).toUpperCase().replace(/[^A-Z0-9\-]/g,'');
      newItems.push(obj);count++;
    });
    if(mode==='replace'){S.items=newItems;S.counters.itemId=newItems.length;}
    else{S.counters.itemId+=count;S.items.push(...newItems);}
  }
  else if(xlTab==='comp'){
    xlRows.forEach(r=>{
      const obj={};
      mapped.forEach(f=>{const v=r[xlColMap[f.key]]||'';if(v)obj[f.key]=v;});
      if(!obj.name)return;
      const nameL=obj.name.toLowerCase();
      const match=S.companies.find(c=>c.name.toLowerCase().includes(nameL.split(' ')[0])||nameL.includes(c.name.toLowerCase().split(' ')[0]));
      if(match){
        Object.keys(obj).forEach(k=>{if(obj[k]&&k!=='id')match[k]=obj[k];});count++;
      } else {
        const id=obj.name.substring(0,3).toLowerCase().replace(/[^a-z]/g,'');
        const newCo={id:id,shortName:obj.invoicePrefix||obj.name.substring(0,3).toUpperCase(),stateCode:'27',bankAddress:'',bankBranch:'',micr:'',upiId:'',contact:'',email:'',nextInvoiceNo:1,nextQuoteNo:1,nextChallanNo:1,nextProformaNo:1,...obj};
        S.companies.push(newCo);count++;
      }
    });
  }
  else if(xlTab==='doc'){
    const coId=document.getElementById('xlDocCo')?.value;
    const custId=document.getElementById('xlDocCust')?.value;
    const docType=document.getElementById('xlDocType')?.value||'invoice';
    if(!custId){toast('Select a customer first','error');return;}
    const items=[];
    xlRows.forEach(r=>{
      const obj={itemId:'',code:'',description:'',hsn:'',qty:1,uom:'NOS',rate:0,discPct:0,gstRate:18};
      mapped.forEach(f=>{let v=r[xlColMap[f.key]]||'';if(['qty','rate','discPct','gstRate'].includes(f.key))v=parseFloat(String(v).replace(/[^0-9.]/g,''))||0;if(v!=='')obj[f.key]=v;});
      if(!obj.description||!obj.rate)return;
      const mi=S.items.find(x=>(obj.code&&x.code===obj.code)||x.description.toLowerCase()===obj.description.toLowerCase());
      if(mi){obj.itemId=mi.id;if(!obj.hsn)obj.hsn=mi.hsn;if(!obj.uom||obj.uom==='NOS')obj.uom=mi.uom;}
      items.push(obj);
    });
    if(!items.length){toast('No valid items found','error');return;}
    cid=coId;dt=docType;LI=items;selCustId=custId;edoc=null;
    sv();sp('create');
    setTimeout(()=>{pickCust(custId);recalc();},100);
    toast(items.length+' items loaded into new '+docType);
    return;
  }

  sv();toast(count+' '+xlTab+' records imported!');
  xlStep=1;xlHeaders=[];xlRows=[];
  if(xlTab==='cust')sp('cust');
  else if(xlTab==='item')sp('item');
  else if(xlTab==='comp')sp('co');
  else rp();
}

// ---- Firebase functions ----
function fbInit(){
  if(!fbConfig||!fbConfig.apiKey||!fbConfig.databaseURL)return;
  try{
    if(!firebase.apps.length)firebase.initializeApp(fbConfig);
    else firebase.app();
    fbDb=firebase.database();
    fbConnected=true;
  }catch(e){console.error('Firebase init error:',e);fbConnected=false;}
}

function fbSaveConfig(){
  const apiKey=document.getElementById('fbApiKey')?.value?.trim();
  const databaseURL=document.getElementById('fbDbUrl')?.value?.trim();
  const projectId=document.getElementById('fbProjId')?.value?.trim();
  if(!apiKey||!databaseURL){toast('API Key and Database URL are required','error');return;}
  fbConfig={apiKey,databaseURL,projectId};
  localStorage.setItem('bm3_fbConfig',JSON.stringify(fbConfig));
  try{
    if(firebase.apps.length){firebase.app().delete().then(()=>{fbInitAndTest();});}
    else fbInitAndTest();
  }catch(e){fbInitAndTest();}
}

function fbInitAndTest(){
  try{
    firebase.initializeApp(fbConfig);
    fbDb=firebase.database();
    // Test write
    fbDb.ref('_ping').set({t:Date.now()}).then(()=>{
      fbConnected=true;
      toast('Firebase connected!');
      rp();
    }).catch(e=>{
      fbConnected=false;
      toast('Firebase error: '+e.message+'. Check your database URL and rules.','error');
      rp();
    });
  }catch(e){
    fbConnected=false;
    toast('Firebase init failed: '+e.message,'error');
  }
}

function fbToggleAuto(checked){
  fbAutoSync=checked;
  localStorage.setItem('bm3_fbAuto',checked?'true':'false');
  toast(checked?'Auto-sync enabled':'Auto-sync disabled');
}

async function fbPush(silent){
  if(!fbDb||fbSyncing)return;
  fbSyncing=true;
  if(!silent)toast('Pushing to Firebase...');
  try{
    await fbDb.ref('billmanager').set({
      customers:S.customers,
      items:S.items,
      companies:S.companies,
      documents:S.documents,
      counters:S.counters,
      lastSync:new Date().toISOString()
    });
    fbLastSync=new Date().toISOString();
    localStorage.setItem('bm3_fbLastSync',fbLastSync);
    if(!silent){toast('All data pushed to Firebase!');if(pg==='gsync')rp();}
  }catch(e){if(!silent)toast('Push failed: '+e.message,'error');}
  finally{fbSyncing=false;}
}

async function fbPullData(){
  if(!fbDb||fbSyncing)return;
  fbSyncing=true;
  toast('Pulling from Firebase...');
  try{
    const snap=await fbDb.ref('billmanager').once('value');
    const d=snap.val();
    if(!d){toast('No data found in Firebase. Push first!','warning');fbSyncing=false;return;}
    if(d.customers&&d.customers.length)S.customers=d.customers;
    if(d.items&&d.items.length)S.items=d.items;
    if(d.companies&&d.companies.length){
      d.companies.forEach(sc=>{
        const existing=S.companies.find(c=>c.id===sc.id);
        if(existing)Object.keys(sc).forEach(k=>{if(sc[k]!==''&&sc[k]!==undefined)existing[k]=sc[k];});
        else S.companies.push(sc);
      });
    }
    if(d.documents&&d.documents.length)S.documents=d.documents;
    if(d.counters){
      if(d.counters.customerId)S.counters.customerId=+d.counters.customerId;
      if(d.counters.itemId)S.counters.itemId=+d.counters.itemId;
      if(d.counters.docId)S.counters.docId=+d.counters.docId;
    }
    const prevAuto=fbAutoSync;fbAutoSync=false;sv();fbAutoSync=prevAuto;
    fbLastSync=new Date().toISOString();
    localStorage.setItem('bm3_fbLastSync',fbLastSync);
    toast('Pulled! '+S.customers.length+' customers, '+S.items.length+' items, '+S.documents.length+' docs');
    rp();
  }catch(e){toast('Pull failed: '+e.message,'error');}
  finally{fbSyncing=false;}
}

let _fbSyncTimer=null;
function fbSyncAuto(){
  if(!fbDb||fbSyncing)return;
  clearTimeout(_fbSyncTimer);
  _fbSyncTimer=setTimeout(()=>fbPush(true),1500);
}

// ---- Auto-load from Firebase on app startup ----
function fbBootstrap(){
  if(!fbConfig||!fbConfig.apiKey||!fbConfig.databaseURL)return Promise.resolve(false);
  return new Promise(resolve=>{
    try{
      if(!firebase.apps.length)firebase.initializeApp(fbConfig);
      fbDb=firebase.database();
      fbDb.ref('billmanager').once('value').then(snap=>{
        const d=snap.val();
        fbConnected=true;
        if(d&&(d.customers||d.documents)){
          if(d.customers&&d.customers.length)S.customers=d.customers;
          if(d.items&&d.items.length)S.items=d.items;
          if(d.companies&&d.companies.length){
            d.companies.forEach(sc=>{
              const existing=S.companies.find(c=>c.id===sc.id);
              if(existing)Object.keys(sc).forEach(k=>{if(sc[k]!==''&&sc[k]!==undefined)existing[k]=sc[k];});
              else S.companies.push(sc);
            });
          }
          if(d.documents&&d.documents.length)S.documents=d.documents;
          if(d.counters){
            if(d.counters.customerId)S.counters.customerId=+d.counters.customerId;
            if(d.counters.itemId)S.counters.itemId=+d.counters.itemId;
            if(d.counters.docId)S.counters.docId=+d.counters.docId;
          }
          localStorage.setItem('bm3',JSON.stringify(S));
          fbLastSync=new Date().toISOString();
          localStorage.setItem('bm3_fbLastSync',fbLastSync);
        }
        resolve(true);
      }).catch(e=>{console.error('Firebase pull error:',e);fbConnected=false;resolve(false);});
    }catch(e){console.error('Firebase init error:',e);resolve(false);}
  });
}

// ---- Listen for real-time changes from other sessions ----
function fbListenForChanges(){
  if(!fbDb)return;
  fbDb.ref('billmanager').on('value',snap=>{
    if(fbSyncing)return; // ignore our own writes
    const d=snap.val();
    if(!d)return;
    if(d.customers&&d.customers.length)S.customers=d.customers;
    if(d.items&&d.items.length)S.items=d.items;
    if(d.companies&&d.companies.length){
      S.companies.forEach(lc=>{
        const rc=d.companies.find(c=>c.id===lc.id);
        if(rc)Object.keys(rc).forEach(k=>{if(rc[k]!==''&&rc[k]!==undefined)lc[k]=rc[k];});
      });
      d.companies.forEach(rc=>{if(!S.companies.find(c=>c.id===rc.id))S.companies.push(rc);});
    }
    if(d.documents&&d.documents.length)S.documents=d.documents;
    if(d.counters){
      if(d.counters.customerId)S.counters.customerId=+d.counters.customerId;
      if(d.counters.itemId)S.counters.itemId=+d.counters.itemId;
      if(d.counters.docId)S.counters.docId=+d.counters.docId;
    }
    localStorage.setItem('bm3',JSON.stringify(S));
    // Refresh current view if on a list page
    if(['dash','inv','quo','dc','pi','cust','item','co'].includes(pg))rp();
  });
}

function gsSaveUrl(){

  if(!url){toast('Enter a URL','error');return;}
  gsUrl=url;localStorage.setItem('bm3_gsUrl',gsUrl);toast('URL saved!');rp();

function gsJsonp(url){
  return new Promise((resolve,reject)=>{
    const cbName='_gsCb_'+Date.now()+'_'+Math.random().toString(36).substr(2,5);
    const timeout=setTimeout(()=>{cleanup();reject(new Error('Timed out'));},30000);
    function cleanup(){clearTimeout(timeout);delete window[cbName];const s=document.getElementById(cbName);if(s)s.remove();}
    window[cbName]=function(data){cleanup();resolve(data);};
    const script=document.createElement('script');script.id=cbName;
    script.src=url+'&callback='+cbName;
    script.onerror=function(){cleanup();reject(new Error('Failed. Check URL.'));};
    document.body.appendChild(script);
  });
}

async function gsTestConnection(){
  if(!gsUrl)return;toast('Testing...');

}

  }catch(e){toast('Failed: '+e.message,'error');}finally{gsSyncing=false;}

async function gsPullGs(){
  if(!gsUrl||gsSyncing)return;gsSyncing=true;toast('Pulling from Sheets...');

    const d=await gsJsonp(gsUrl+'?action=getAll');
    if(d.success&&d.data){

      if(d.data.items?.length)S.items=d.data.items;
      if(d.data.documents?.length)S.documents=d.data.documents;
      sv();toast('Pulled from Sheets!');rp();
    }else toast('No data','error');
  }catch(e){toast('Failed: '+e.message,'error');}finally{gsSyncing=false;}
}

  <div style="margin-top:16px;padding:14px;background:#fefce8;border-radius:8px;font-size:12px;color:#854d0e">
    <b>How it works:</b> Upload a photo of an invoice or bill. OCR will extract the text, then smart parsing will detect line items (description, quantity, rate, amount). You can review and edit the extracted items before generating a document in the system.
    <br><b>Tips:</b> Clear photos work best. Printed text is easier to read than handwriting. Make sure the image is well-lit and not blurry.
  </div>`;
}

function handleOcrDrop(e){const f=e.dataTransfer.files[0];if(f)handleOcrFile(f);}

function handleOcrFile(file){
  if(!file||!file.type.startsWith('image/'))return toast('Please select an image file','error');
  const reader=new FileReader();
  reader.onload=function(e){
    const el=document.getElementById('xlContent');
    if(!el)return;
    el.innerHTML=`<div style="text-align:center"><img src="${e.target.result}" class="ocr-preview" alt="Uploaded invoice">
      <div class="ocr-progress"><div class="ocr-status" id="ocrStatus">Initializing OCR engine...</div><div class="ocr-bar"><div class="ocr-bar-fill" id="ocrBar" style="width:5%"></div></div></div></div>`;
    xlStep=2;updateSteps();
    runOcr(e.target.result);
  };
  reader.readAsDataURL(file);
}

async function runOcr(imgData){
  const bar=document.getElementById('ocrBar');
  const status=document.getElementById('ocrStatus');
  try{
    if(typeof Tesseract==='undefined'){
      if(status)status.textContent='Loading Tesseract.js...';
      await new Promise((resolve,reject)=>{
        const s=document.createElement('script');
        s.src='https://cdnjs.cloudflare.com/ajax/libs/tesseract.js/5.1.1/tesseract.min.js';
        s.onload=resolve;s.onerror=reject;document.head.appendChild(s);
      });
    }
    const worker=await Tesseract.createWorker('eng',1,{
      logger:m=>{
        if(m.status&&status)status.textContent=m.status.replace(/_/g,' ');
        if(m.progress!==undefined&&bar)bar.style.width=Math.round(m.progress*100)+'%';
      }
    });
    const{data}=await worker.recognize(imgData);
    ocrRawText=data.text;
    await worker.terminate();
    ocrItems=parseOcrText(ocrRawText);
    xlStep=3;updateSteps();
    const el=document.getElementById('xlContent');
    if(el)el.innerHTML=rOcrReview();
    toast(ocrItems.length+' line items extracted');
  }catch(err){
    if(status)status.textContent='OCR failed: '+err.message;
    toast('OCR error: '+err.message,'error');
  }
}

function parseOcrText(text){
  const lines=text.split(/\r?\n/).filter(l=>l.trim());
  const items=[];
  // Try multiple patterns for line item detection
  for(const line of lines){
    let m;
    // Pattern 1: Number at start (Sr.No), description, qty, rate, amount  e.g. "1  Widget  10  250.00  2500.00"
    m=line.match(/^\s*\d+[\.\)]\s*(.+?)\s+(\d+(?:\.\d+)?)\s+(\d+(?:\.\d+)?)\s+(\d[\d,]*(?:\.\d+)?)\s*$/);
    if(m){items.push({description:m[1].trim(),qty:parseFloat(m[2]),rate:parseFloat(m[3]),amount:parseFloat(m[4].replace(/,/g,''))});continue;}
    // Pattern 2: Description, qty, rate, amount (no sr.no)
    m=line.match(/^([A-Za-z].+?)\s+(\d+(?:\.\d+)?)\s+(\d+(?:\.\d+)?)\s+(\d[\d,]*(?:\.\d+)?)\s*$/);
    if(m){items.push({description:m[1].trim(),qty:parseFloat(m[2]),rate:parseFloat(m[3]),amount:parseFloat(m[4].replace(/,/g,''))});continue;}
    // Pattern 3: Description and amount only (qty=1, rate=amount)
    m=line.match(/^([A-Za-z].{3,}?)\s+(\d[\d,]*(?:\.\d{2})?)\s*$/);
    if(m&&parseFloat(m[2].replace(/,/g,''))>1){
      const amt=parseFloat(m[2].replace(/,/g,''));
      items.push({description:m[1].trim(),qty:1,rate:amt,amount:amt});continue;
    }
    // Pattern 4: Sr.No, description, HSN, qty, unit, rate, amount
    m=line.match(/^\s*\d+[\.\)]\s*(.+?)\s+\d{4,8}\s+(\d+(?:\.\d+)?)\s+\w+\s+(\d+(?:\.\d+)?)\s+(\d[\d,]*(?:\.\d+)?)\s*$/);
    if(m){items.push({description:m[1].trim(),qty:parseFloat(m[2]),rate:parseFloat(m[3]),amount:parseFloat(m[4].replace(/,/g,''))});continue;}
    // Pattern 5: Qty x Rate = Amount pattern  e.g. "Widget 10 x 250 = 2500"
    m=line.match(/^(.+?)\s+(\d+(?:\.\d+)?)\s*[xX×]\s*(\d+(?:\.\d+)?)\s*[=\-]\s*(\d[\d,]*(?:\.\d+)?)/);
    if(m){items.push({description:m[1].trim(),qty:parseFloat(m[2]),rate:parseFloat(m[3]),amount:parseFloat(m[4].replace(/,/g,''))});continue;}
  }
  // Validate: auto-correct amounts where qty*rate is close
  items.forEach(it=>{
    const calc=it.qty*it.rate;
    if(Math.abs(calc-it.amount)>1&&calc>0)it.amount=Math.round(calc*100)/100;
  });
  return items;
}

function rOcrReview(){
  let h=`<div class="imp-stats">
    <div class="imp-stat"><b>${ocrItems.length}</b>Items extracted</div>
    <div class="imp-stat"><b>${ocrRawText.split(/\r?\n/).filter(l=>l.trim()).length}</b>Text lines</div>
  </div>`;
  // Company / Customer / Doc type selectors
  h+=`<div class="fr f3" style="margin-bottom:12px">
    <div class="fg"><label>Company</label><select id="ocrCo">${S.companies.map(c=>`<option value="${c.id}">${c.name}</option>`).join('')}</select></div>
    <div class="fg"><label>Customer</label><select id="ocrCust"><option value="">— Select —</option>${S.customers.map(c=>`<option value="${c.id}">${c.code} — ${c.name}</option>`).join('')}</select></div>
    <div class="fg"><label>Doc Type</label><select id="ocrDocType"><option value="invoice">Tax Invoice</option><option value="quotation">Quotation</option><option value="challan">Delivery Challan</option><option value="proforma">Proforma Invoice</option></select></div>
  </div>`;
  // Editable items table
  if(ocrItems.length){
    h+=`<div style="font-size:12px;font-weight:600;margin-bottom:6px">Extracted Line Items <span style="font-weight:400;color:var(--tl)">(edit as needed)</span></div>
    <div style="max-height:300px;overflow-y:auto;border:1px solid var(--b);border-radius:8px">
    <table class="ocr-edit-table"><thead><tr><th style="width:40%">Description</th><th style="width:10%">Qty</th><th style="width:10%">UOM</th><th style="width:15%">Rate</th><th style="width:15%">Amount</th><th style="width:10%"></th></tr></thead><tbody>`;
    ocrItems.forEach((it,i)=>{
      h+=`<tr id="ocrRow${i}"><td><input value="${(it.description||'').replace(/"/g,'&quot;')}" onchange="ocrItems[${i}].description=this.value"></td>
        <td><input type="number" value="${it.qty}" min="0" step="any" onchange="ocrItems[${i}].qty=+this.value;ocrRecalcRow(${i})"></td>
        <td><input value="${it.uom||'NOS'}" onchange="ocrItems[${i}].uom=this.value"></td>
        <td><input type="number" value="${it.rate}" min="0" step="any" onchange="ocrItems[${i}].rate=+this.value;ocrRecalcRow(${i})"></td>
        <td><input type="number" value="${it.amount}" min="0" step="any" id="ocrAmt${i}" onchange="ocrItems[${i}].amount=+this.value"></td>
        <td><button class="rl" onclick="ocrItems.splice(${i},1);document.getElementById('xlContent').innerHTML=rOcrReview();">×</button></td></tr>`;
    });
    h+=`</tbody></table></div>`;
    const total=ocrItems.reduce((s,it)=>s+(it.amount||0),0);
    h+=`<div style="text-align:right;margin-top:8px;font-size:13px;font-weight:700;color:var(--p)">Total: ₹${total.toLocaleString('en-IN',{minimumFractionDigits:2})}</div>`;
  } else {
    h+=`<div style="padding:20px;text-align:center;color:var(--tl)">No line items detected. You can add items manually or check the raw text below.</div>`;
  }
  // Add row button
  h+=`<div style="margin:10px 0"><button class="bt bo bsm" onclick="ocrItems.push({description:'',qty:1,uom:'NOS',rate:0,amount:0});document.getElementById('xlContent').innerHTML=rOcrReview();">+ Add Row</button></div>`;
  // Raw text toggle
  h+=`<details style="margin:10px 0"><summary style="cursor:pointer;font-size:12px;font-weight:600;color:var(--tl)">View Raw OCR Text</summary><div class="ocr-raw">${ocrRawText.replace(/</g,'&lt;')}</div></details>`;
  // Action buttons
  h+=`<div style="margin-top:16px;display:flex;justify-content:space-between">
    <button class="bt bo" onclick="xlStep=1;ocrItems=[];ocrRawText='';rp()">← Start Over</button>
    <button class="bt bs blg" onclick="doOcrGenerate()">📄 Generate Document</button></div>`;
  return h;
}

function ocrRecalcRow(i){
  const it=ocrItems[i];if(!it)return;
  it.amount=Math.round(it.qty*it.rate*100)/100;
  const el=document.getElementById('ocrAmt'+i);if(el)el.value=it.amount;
}

function doOcrGenerate(){
  const coId=document.getElementById('ocrCo')?.value;
  const custId=document.getElementById('ocrCust')?.value;
  const docType=document.getElementById('ocrDocType')?.value||'invoice';
  if(!custId){toast('Please select a customer','error');return;}
  if(!ocrItems.length){toast('No items to generate','error');return;}
  const items=ocrItems.filter(it=>it.description).map(it=>{
    const obj={itemId:'',code:'',description:it.description,hsn:'',qty:it.qty||1,uom:it.uom||'NOS',rate:it.rate||0,discPct:0,gstRate:18};
    // Try to match with existing items
    const mi=S.items.find(x=>x.description.toLowerCase()===it.description.toLowerCase()||x.description.toLowerCase().includes(it.description.toLowerCase().substring(0,15)));
    if(mi){obj.itemId=mi.id;obj.code=mi.code;obj.hsn=mi.hsn;obj.gstRate=mi.gstRate||18;if(!it.uom||it.uom==='NOS')obj.uom=mi.uom;}
    return obj;
  });
  if(!items.length){toast('No valid items','error');return;}
  cid=coId;dt=docType;LI=items;selCustId=custId;edoc=null;
  sv();sp('create');
  setTimeout(()=>{pickCust(custId);recalc();},100);
  toast(items.length+' items loaded from image into new '+docType);
  ocrItems=[];ocrRawText='';
}

// Keyboard shortcuts
document.addEventListener('keydown',e=>{
  if(e.ctrlKey||e.metaKey){
    if(e.key==='s'&&pg==='create'){e.preventDefault();saveDoc();}
  }
});

// ---- APP STARTUP ----
(async function boot(){
  const mn=document.getElementById('mn');
  if(fbConfig&&fbConfig.apiKey){
    mn.innerHTML='<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:60vh;gap:14px"><div style="font-size:40px">☁️</div><div style="font-size:15px;font-weight:600;color:var(--p)">Loading data from Firebase...</div><div style="width:200px;height:6px;background:var(--b);border-radius:3px;overflow:hidden"><div style="width:60%;height:100%;background:var(--p);border-radius:3px;animation:pulse 1s infinite alternate"></div></div><div style="font-size:11px;color:var(--tl)">Syncing across all your devices</div></div>';
    const ok=await fbBootstrap();
    if(ok){
      fbListenForChanges();
      toast('Data loaded from cloud');
    }else{
      toast('Using local data (Firebase unavailable)','warning');
    }
  }
  sp('dash');
})();
</script>
